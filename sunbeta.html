<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hackers Cup 26 – Sunday Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0" />
  <style>
    body { font-family: system-ui; background:#0f172a; color:#f1f5f9; padding:20px; }
    h1 { margin-top:0; }
    .updated { font-size:13px; opacity:0.7; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { padding:10px 6px; border-bottom:1px solid #1e293b; }
    th { color:#cbd5e1; text-align:left; font-size:14px; }
  </style>
<link rel="manifest" href="site.webmanifest">
</head>
<body>

<h1>Sunday Ambrose Leaderboard</h1>
<div id="updated" class="updated"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Team</th>
      <th>Gross</th>
      <th>HC</th>
      <th>Net</th>
    </tr>
  </thead>
  <tbody id="lbBody"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
      getFirestore, collection, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Client-side leaderboard calculation for Sunday (Gross/Net scoring)
    function calculateTeamLeaderboard(scorecards) {
      const leaderboard = [];
      scorecards.forEach((doc) => {
        const d = doc.data();
        let gross = 0;
        for (let i = 1; i <= 18; i++) {
          const strokes = d[`hole${i}`];
          if (!strokes) continue;
          gross += strokes;
        }
        const handicap = d.handicap || d.teamHandicap || 0;
        const net = gross - handicap;
        leaderboard.push({
          id: doc.id,
          teamName: d.teamName || doc.id,
          grossTotal: gross,
          handicap: handicap,
          netTotal: net,
        });
      });
      leaderboard.sort((a, b) => a.netTotal - b.netTotal);
      return leaderboard;
    }

    const firebaseConfig = {
      apiKey:"AIzaSyDuQNnLLtX6GrhvIbwenSGEHjWp2JOWUZ8",
      authDomain:"hackers-cup.firebaseapp.com",
      projectId:"hackers-cup"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadLeaderboard() {
      try {
        // Fetch scorecards directly (free Firestore read)
        const snap = await getDocs(
          collection(db, "competitions", "hackersCup26", "rounds", "sunday", "scorecards")
        );

        const leaderboard = calculateTeamLeaderboard(Array.from(snap.docs));

        // Update timestamp
        document.getElementById("updated").textContent =
          "Updated: " + new Date().toLocaleString();

        // Render leaderboard
        const tbody = document.getElementById("lbBody");
        tbody.innerHTML = "";

        leaderboard.forEach((r, idx) => {
          tbody.innerHTML += `
            <tr>
              <td>${idx + 1}</td>
              <td>${r.teamName}</td>
              <td>${r.grossTotal}</td>
              <td>${r.handicap}</td>
              <td>${r.netTotal}</td>
            </tr>
          `;
        });
      } catch (error) {
        console.error("Error loading leaderboard:", error);
        document.getElementById("lbBody").innerHTML = `
          <tr><td colspan="5">Error loading leaderboard</td></tr>
        `;
      }
</script>

</body>
</html>
