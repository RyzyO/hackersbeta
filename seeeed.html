<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Seeder — Hackers Cup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            s0: '#060911', s1: '#0c1019', s2: '#111725', s3: '#182030', s4: '#1f2a3e',
            accent: '#06d6a4', brd: '#1c2640',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { background: #060911; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #2a3550; border-radius: 99px; }
    .log-line { border-bottom: 1px solid #1c2640; padding: 6px 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: flex-start; gap: 8px; }
    .log-line:last-child { border-bottom: none; }
    .badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .badge-ok   { background: rgba(6,214,164,0.15); color: #06d6a4; }
    .badge-skip { background: rgba(100,116,139,0.15); color: #94a3b8; }
    .badge-warn { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .badge-err  { background: rgba(248,113,113,0.15); color: #f87171; }
    .badge-info { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-dry  { background: rgba(168,85,247,0.15); color: #c084fc; }
  </style>
</head>
<body class="text-slate-200 font-sans min-h-screen antialiased p-6">

  <div class="max-w-5xl mx-auto space-y-5">

    <!-- Header -->
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-accent/15 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5H4.5a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" /></svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white">Email Seeder</h1>
        <p class="text-xs text-slate-500">Matches players by displayName and writes their email field in Firestore</p>
      </div>
    </div>

    <!-- Sign in -->
    <div id="signInCard" class="bg-s1 border border-brd rounded-2xl p-6 space-y-3">
      <h2 class="text-sm font-semibold text-slate-300">Sign in</h2>
      <div class="grid grid-cols-2 gap-3">
        <input id="emailInput" type="email" placeholder="Admin email" autocomplete="email"
          class="px-4 py-2.5 rounded-xl bg-s2 border border-brd text-white text-sm placeholder-slate-500 focus:outline-none focus:border-accent transition" />
        <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password"
          class="px-4 py-2.5 rounded-xl bg-s2 border border-brd text-white text-sm placeholder-slate-500 focus:outline-none focus:border-accent transition" />
      </div>
      <button id="signInBtn" class="px-5 py-2.5 rounded-xl bg-accent text-s0 font-bold text-sm hover:brightness-110 active:scale-[0.98] transition">
        Sign in &amp; load tool
      </button>
      <p id="signInErr" class="text-xs text-red-400 min-h-[16px]"></p>
    </div>

    <!-- Tool -->
    <div id="toolCard" class="hidden bg-s1 border border-brd rounded-2xl p-6 space-y-5">

      <div class="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 class="text-sm font-semibold text-slate-300">Name → Email pairs</h2>
          <p class="text-xs text-slate-500 mt-0.5">One entry per line: <code class="text-accent bg-s2 px-1 py-0.5 rounded">Full Name | email@example.com</code> — the tool fuzzy-matches displayName in Firestore.</p>
        </div>
        <div class="flex items-center gap-3 text-xs">
          <span id="authUser" class="text-slate-400"></span>
          <button id="signOutBtn" class="text-red-400 hover:text-red-300 transition">Sign out</button>
        </div>
      </div>

      <textarea id="pairList" rows="16"
        class="w-full px-4 py-3 rounded-xl bg-s2 border border-brd text-white text-xs font-mono placeholder-slate-600 focus:outline-none focus:border-accent transition resize-y"></textarea>

      <!-- Options -->
      <div class="flex flex-wrap gap-6">
        <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300">
          <input type="checkbox" id="dryRun" checked class="accent-accent" />
          Dry run (log only, no writes)
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300">
          <input type="checkbox" id="overwrite" class="accent-accent" />
          Overwrite existing email field
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300">
          <input type="checkbox" id="fuzzy" checked class="accent-accent" />
          Fuzzy name match (ignores punctuation &amp; case)
        </label>
      </div>

      <div class="flex flex-wrap gap-2 items-center">
        <button id="runBtn" class="px-5 py-2.5 rounded-xl bg-accent text-s0 font-bold text-sm hover:brightness-110 active:scale-[0.98] transition">
          Run seeder
        </button>
        <button id="clearLogBtn" class="px-4 py-2.5 rounded-xl bg-s3 border border-brd text-slate-300 text-sm hover:bg-s4 transition">
          Clear log
        </button>
        <div id="progressWrap" class="hidden items-center gap-2 text-xs text-slate-400">
          <svg class="animate-spin w-3.5 h-3.5 text-accent" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
          <span id="progressText">Working…</span>
        </div>
      </div>

      <!-- Summary -->
      <div id="summaryBar" class="hidden grid grid-cols-4 gap-3 text-center">
        <div class="bg-s2 border border-brd rounded-xl p-3">
          <div class="text-xs text-slate-500 mb-0.5">Total</div>
          <div class="text-xl font-bold text-white" id="sumTotal">0</div>
        </div>
        <div class="bg-s2 border border-brd rounded-xl p-3">
          <div class="text-xs text-slate-500 mb-0.5">Written</div>
          <div class="text-xl font-bold text-accent" id="sumWritten">0</div>
        </div>
        <div class="bg-s2 border border-brd rounded-xl p-3">
          <div class="text-xs text-slate-500 mb-0.5">Skipped</div>
          <div class="text-xl font-bold text-slate-400" id="sumSkipped">0</div>
        </div>
        <div class="bg-s2 border border-brd rounded-xl p-3">
          <div class="text-xs text-slate-500 mb-0.5">Not found</div>
          <div class="text-xl font-bold text-amber-400" id="sumNotFound">0</div>
        </div>
      </div>

      <!-- Log -->
      <div id="logContainer" class="bg-s2 border border-brd rounded-xl overflow-hidden hidden">
        <div class="flex items-center justify-between px-3 py-2 border-b border-brd">
          <span class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">Log</span>
          <button id="copyLogBtn" class="text-xs text-slate-500 hover:text-slate-300 transition">Copy log</button>
        </div>
        <div id="logBody" class="max-h-[480px] overflow-y-auto"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYat6m3-Lv46vfm6xcHLjTjRDq7NdCxAk",
      authDomain: "hackers-cup.firebaseapp.com",
      databaseURL: "https://hackers-cup-default-rtdb.firebaseio.com",
      projectId: "hackers-cup",
      storageBucket: "hackers-cup.appspot.com",
      messagingSenderId: "765736070872",
      appId: "1:765736070872:web:86a51c41916e7af75631ad",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const $ = id => document.getElementById(id);

    // ---- Pre-filled pairs: Name | email ----
    const SEED_PAIRS = [
      "Riley Oakes | rileyoakes701@gmail.com",
      "Sam Edwards | sam@sccontractors.com.au",
      "Ben Wood | bighoss8951@gmail.com",
      "Jordan Whitehorn | jordo452@hotmail.com",
      "Derek Shepherd | derek.shepherd1002@gmail.com",
      "Paul Zepernick | zepernick.paul@gmail.com",
      "Brad Spurway | lockivy2@gmail.com",
      "Tamas Mendik | tamasm@rdairsupply.com.au",
      "Joe Foia | joef@rdairsupply.com.au",
      "Matt Kennerson | mattk@rdairsupply.com.au",
      "Glenn Hickey | glennbhickey@gmail.com",
      "Greg Gomes | gorascal@hotmail.com",
      "Willie Cooper | willie@ncga.com.au",
      "Scott Griffiths | scottg@skgbusiness.com",
      "Darshil Patel | darshilpatel93@gmail.com",
      "John Venkat | Jonovenkat@gmail.com",
      "Monil Salgiya | salgiya.monil@gmail.com",
      "Wayne Ritchie | wayner@beak.com.au",
      "Daniel Byrom | DByrom@agnewwines.com.au",
      "Ray Vella | ray-vella@bigpond.com",
      "Rui Lopes | rui@rdairsupply.com.au",
      "John O'Toole | johnotoole_64@yahoo.com.au",
      "Justin Cordell | jaybeecee72@gmail.com",
      "Michael Lagudi | mike.lagudi@gmail.com",
      "Tony Mills | dalecmills@yahoo.com",
      "Johan Bustamante | jjbustamante4@gmail.com",
      "John L'Estrange | Llyn1953@bigpond.com",
      "Aaron Johnson | azjohnson@gmail.com",
    ];

    // ---- Auth ----
    $('signInBtn').onclick = async () => {
      $('signInErr').textContent = '';
      try {
        await signInWithEmailAndPassword(auth, $('emailInput').value.trim(), $('passwordInput').value);
      } catch (e) {
        $('signInErr').textContent = e.message;
      }
    };
    $('signOutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      if (user) {
        $('signInCard').classList.add('hidden');
        $('toolCard').classList.remove('hidden');
        $('authUser').textContent = user.email;
        $('pairList').value = SEED_PAIRS.join('\n');
      } else {
        $('signInCard').classList.remove('hidden');
        $('toolCard').classList.add('hidden');
      }
    });

    // ---- Logging ----
    const logLines = [];
    function addLog(label, badge, badgeClass, message) {
      const logBody = $('logBody');
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="badge ${badgeClass} shrink-0">${badge}</span><span class="text-slate-400 min-w-[200px] shrink-0">${escHtml(label)}</span><span class="text-slate-300">${escHtml(message)}</span>`;
      logBody.appendChild(line);
      logBody.scrollTop = logBody.scrollHeight;
      logLines.push(`[${badge}] ${label} — ${message}`);
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    $('clearLogBtn').onclick = () => {
      $('logBody').innerHTML = '';
      logLines.length = 0;
      $('logContainer').classList.add('hidden');
      $('summaryBar').classList.add('hidden');
    };
    $('copyLogBtn').onclick = () => navigator.clipboard.writeText(logLines.join('\n'));

    // ---- Name normaliser for fuzzy matching ----
    // Strips punctuation, accents, extra spaces, lowercases
    function normName(s) {
      return (s || '')
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // remove accents
        .replace(/[^a-z0-9\s]/g, '')                        // remove punctuation
        .replace(/\s+/g, ' ')
        .trim();
    }

    // ---- Parse textarea ----
    function parsePairs(raw) {
      return raw.split('\n')
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const sep = line.includes('|') ? '|' : line.includes('\t') ? '\t' : null;
          if (!sep) return null;
          const [namePart, emailPart] = line.split(sep).map(p => p.trim());
          if (!namePart || !emailPart || !emailPart.includes('@')) return null;
          return { name: namePart, email: emailPart };
        })
        .filter(Boolean);
    }

    // ---- Main seeder ----
    $('runBtn').onclick = async () => {
      const pairs = parsePairs($('pairList').value);
      if (!pairs.length) { alert('No valid Name | email pairs found.'); return; }

      const dryRun = $('dryRun').checked;
      const overwrite = $('overwrite').checked;
      const fuzzy = $('fuzzy').checked;

      $('logContainer').classList.remove('hidden');
      $('summaryBar').classList.remove('hidden');
      $('progressWrap').classList.remove('hidden');
      $('progressWrap').classList.add('flex');
      $('runBtn').disabled = true;

      let written = 0, skipped = 0, notFound = 0;

      // Load all users once
      $('progressText').textContent = 'Loading Firestore users…';
      let allUsers = [];
      try {
        const snap = await getDocs(collection(db, 'users'));
        snap.forEach(d => allUsers.push({ id: d.id, ...d.data() }));
        addLog('—', 'INFO', 'badge-info', `Loaded ${allUsers.length} user documents`);
      } catch (e) {
        addLog('—', 'ERR', 'badge-err', `Failed to load users: ${e.message}`);
        $('progressWrap').classList.add('hidden');
        $('progressWrap').classList.remove('flex');
        $('runBtn').disabled = false;
        return;
      }

      $('sumTotal').textContent = pairs.length;

      for (let i = 0; i < pairs.length; i++) {
        const { name, email } = pairs[i];
        $('progressText').textContent = `${i + 1} / ${pairs.length}: ${name}`;

        // Try exact displayName match first
        let match = allUsers.find(u => (u.displayName || '').trim().toLowerCase() === name.trim().toLowerCase());

        // Fuzzy fallback
        if (!match && fuzzy) {
          const normTarget = normName(name);
          match = allUsers.find(u => normName(u.displayName) === normTarget);
        }

        // Try matching first + last name separately (handles "L'Estrange" vs "LEstrange" etc)
        if (!match && fuzzy) {
          const parts = normName(name).split(' ');
          if (parts.length >= 2) {
            match = allUsers.find(u => {
              const dn = normName(u.displayName);
              return parts.every(p => p.length > 1 && dn.includes(p));
            });
          }
        }

        if (!match) {
          addLog(name, 'MISS', 'badge-warn', `No Firestore user found matching displayName "${name}"`);
          notFound++;
          $('sumNotFound').textContent = notFound;
          continue;
        }

        const existingEmail = (match.email || '').trim();

        if (existingEmail && !overwrite) {
          addLog(name, 'SKIP', 'badge-skip', `Doc ${match.id} already has email "${existingEmail}" — overwrite is off`);
          skipped++;
          $('sumSkipped').textContent = skipped;
          continue;
        }

        if (dryRun) {
          addLog(name, 'DRY', 'badge-dry', `Would write "${email}" to doc ${match.id} (displayName: "${match.displayName}")`);
          written++;
          $('sumWritten').textContent = written;
          continue;
        }

        try {
          await updateDoc(doc(db, 'users', match.id), { email });
          addLog(name, 'OK', 'badge-ok', `Wrote "${email}" to doc ${match.id} (displayName: "${match.displayName}")`);
          written++;
          $('sumWritten').textContent = written;
        } catch (e) {
          addLog(name, 'ERR', 'badge-err', `Write failed for doc ${match.id}: ${e.message}`);
          notFound++;
          $('sumNotFound').textContent = notFound;
        }
      }

      $('progressText').textContent = `Done — ${written} written, ${skipped} skipped, ${notFound} not found`;
      $('progressWrap').classList.remove('flex');
      $('progressWrap').classList.add('hidden');
      $('runBtn').disabled = false;
    };
  </script>
</body>
</html>
