<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackers Cup Random Hacker Generator</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #fbbf24;
      --accent-2: #38bdf8;
      --good: #22c55e;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(251,191,36,0.18), transparent 26%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    .app {
      width: min(1200px, 100%);
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .left {
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      min-height: 0;
      position: relative;
      overflow: auto;
    }

    .right {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 3vw, 42px);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    .wheel-wrap {
      position: relative;
      width: min(64vw, 56vh, 620px);
      height: min(64vw, 56vh, 620px);
      max-width: 680px;
      max-height: 680px;
      display: grid;
      place-items: center;
      margin-top: 8px;
    }

    .pointer {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 42px solid var(--accent);
      z-index: 5;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 10px rgba(255,255,255,0.08), 0 18px 40px rgba(0,0,0,0.35);
    }

    .center-badge {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #f59e0b);
      color: #111827;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 800;
      line-height: 1.05;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 3;
      padding: 14px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .spin-btn {
      background: linear-gradient(135deg, var(--accent), #f59e0b);
      color: #111827;
      min-width: 160px;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .field,
    .result,
    .stats,
    .list-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 16px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,23,42,0.65);
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .result h2 {
      margin: 0 0 6px;
      font-size: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .winner {
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 900;
      margin: 0;
    }

    .winner-sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat .v {
      font-size: 24px;
      font-weight: 800;
    }

    .list-box {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .list-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .player-list {
      margin: 0;
      padding: 0;
      list-style: none;
      overflow: auto;
      flex: 1;
      display: grid;
      gap: 8px;
      padding-right: 4px;
    }

    .player-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    .player-list li strong {
      color: var(--accent);
      min-width: 52px;
    }

    .footnote {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      body {
        padding: 14px;
      }

      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        min-height: calc(100vh - 28px);
        height: auto;
        gap: 14px;
      }

      .left,
      .right {
        min-height: auto;
        overflow: visible;
      }

      .left {
        padding: 20px 16px;
      }

      .right {
        padding: 16px;
        gap: 12px;
      }

      .panel {
        border-radius: 18px;
      }

      h1 {
        font-size: clamp(24px, 8vw, 34px);
      }

      .subtitle {
        margin: 0 0 10px;
      }

      .wheel-wrap {
        width: min(86vw, 430px);
        height: min(86vw, 430px);
        margin-top: 2px;
      }

      .center-badge {
        width: 92px;
        height: 92px;
        font-size: 13px;
      }

      .pointer {
        border-left-width: 16px;
        border-right-width: 16px;
        border-top-width: 30px;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 6px;
      }

      .controls .spin-btn {
        grid-column: 1 / -1;
      }

      .controls button {
        width: 100%;
        min-width: 0;
        padding: 12px 14px;
      }

      .winner {
        font-size: clamp(22px, 8vw, 32px);
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .list-box {
        max-height: 42vh;
      }

      .list-head {
        margin-bottom: 8px;
      }

      .player-list li {
        font-size: 13px;
        padding: 9px 10px;
      }
    }

    @media (max-width: 420px) {
      .wheel-wrap {
        width: min(84vw, 360px);
        height: min(84vw, 360px);
      }

      .center-badge {
        width: 82px;
        height: 82px;
        font-size: 12px;
      }

      .footnote {
        font-size: 11px;
      }
    }
  </style>
</head>

  <div class="app">
    <section class="panel left">
      <h1>Hackers Cup Spin Wheel</h1>
      <p class="subtitle">Random Hacker Generator • Spin to draw a Hacker Cup number</p>

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheel" width="1400" height="1400"></canvas>
        <div class="center-badge">HACKERS<br>CUP</div>
      </div>

      <div class="controls">
        <button class="spin-btn" id="spinBtn">Spin Wheel</button>
        <button class="secondary-btn" id="spinSearchBtn">Spin Filtered</button>
        <button class="secondary-btn" id="resetBtn">Reset</button>
      </div>
    </section>

    <aside class="panel right">
      <div class="field">
        <label class="label" for="searchInput">Filter players</label>
        <input id="searchInput" type="text" placeholder="Type a name or number..." />

      <div class="result">
        <h2>Selected Hacker</h2>
        <p class="winner" id="winnerName">Ready to spin</p>
        <p class="winner-sub" id="winnerMeta">273 loaded</p>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">Total loaded</div>
          <div class="v" id="totalCount">0</div>
        </div>
        <div class="stat">
          <div class="k">Filtered pool</div>
          <div class="v" id="filteredCount">0</div>
        </div>
      </div>

      <div class="list-box">
        <div class="list-head">
          <h3>Hackers</h3>
          <span class="footnote">Showing live filtered list</span>
        </div>
        <ul class="player-list" id="playerList"></ul>
      </div>

      
    </aside>
  </div>

      { no: 257, name: "Brad Spurway" },
      { no: 258, name: "Paul McLean" },
      { no: 259, name: "Andrew Minnikin" },
      { no: 260, name: "Tamas Mendick" },
      { no: 261, name: "Joe Foia" },
      { no: 262, name: "Matt Kennerson" },
      { no: 263, name: "Matt Toohey" },
      { no: 264, name: "Glenn Hickey" },
      { no: 265, name: "Greg Gomes" },
      { no: 266, name: "Edward O'Sullivan" },
      { no: 267, name: "Willie Cooper" },
      { no: 268, name: "Scott Griffiths" },
      { no: 269, name: "Ray Vella" },
      { no: 270, name: "Lachlan Hill" },
      { no: 271, name: "John O'Toole" },
      { no: 272, name: "Charlie Sharp" },
      { no: 273, name: "Ryan Nancarrow" }
    ];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const spinSearchBtn = document.getElementById('spinSearchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('searchInput');
    const winnerName = document.getElementById('winnerName');
    const winnerMeta = document.getElementById('winnerMeta');
    const totalCount = document.getElementById('totalCount');
    const filteredCount = document.getElementById('filteredCount');
    const playerList = document.getElementById('playerList');
    const wheelWrap = document.querySelector('.wheel-wrap');

    let rotation = 0;
    let spinning = false;
    let filteredPlayers = [...players];
    let wheelCacheCanvas = null;
    let wheelCacheKey = '';

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getPalette(i) {
      const palettes = [
        ['#0ea5e9', '#0369a1'],
        ['#f59e0b', '#b45309'],
        ['#22c55e', '#15803d'],
        ['#a855f7', '#7e22ce'],
        ['#ef4444', '#b91c1c'],
        ['#14b8a6', '#0f766e'],
        ['#eab308', '#a16207'],
        ['#3b82f6', '#1d4ed8']
      ];
      return palettes[i % palettes.length];
    }

    function renderList() {
      playerList.innerHTML = filteredPlayers
        .slice(0, 273)
        .map(p => `<li><strong>#${p.no}</strong><span>${p.name}</span></li>`)
        .join('');
    }

    function getWheelCacheKey(pool) {
      if (!pool.length) return 'empty';
      return `${pool.length}:${pool[0].no}:${pool[pool.length - 1].no}:${canvas.width}x${canvas.height}`;
    }

    function buildWheelCache(pool = filteredPlayers) {
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.min(w, h) / 2 - 18;

      const cached = document.createElement('canvas');
      cached.width = w;
      cached.height = h;
      const cctx = cached.getContext('2d');

      if (!pool.length) {
        cctx.save();
        cctx.translate(cx, cy);
        cctx.beginPath();
        cctx.arc(0, 0, radius, 0, Math.PI * 2);
        cctx.fillStyle = '#334155';
        cctx.fill();
        cctx.fillStyle = '#ffffff';
        cctx.font = 'bold 54px Inter, Arial';
        cctx.textAlign = 'center';
        cctx.textBaseline = 'middle';
        cctx.fillText('No matches', 0, 0);
        cctx.restore();
        return cached;
      }

      const sliceAngle = (Math.PI * 2) / pool.length;

      cctx.save();
      cctx.translate(cx, cy);

      for (let i = 0; i < pool.length; i++) {
        const start = i * sliceAngle - Math.PI / 2;
        const end = start + sliceAngle;
        const [c1, c2] = getPalette(i);

        const grad = cctx.createLinearGradient(
          Math.cos(start) * radius,
          Math.sin(start) * radius,
          Math.cos(end) * radius,
          Math.sin(end) * radius
        );
        grad.addColorStop(0, c1);
        grad.addColorStop(1, c2);

        cctx.beginPath();
        cctx.moveTo(0, 0);
        cctx.arc(0, 0, radius, start, end);
        cctx.closePath();
        cctx.fillStyle = grad;
        cctx.fill();

        cctx.lineWidth = 2;
        cctx.strokeStyle = 'rgba(255,255,255,0.22)';
        cctx.stroke();

        const mid = start + sliceAngle / 2;
        cctx.save();
        cctx.rotate(mid);
        cctx.textAlign = 'right';
        cctx.fillStyle = '#ffffff';

        const showFullName = pool.length <= 120;
        const text = showFullName ? `#${pool[i].no} ${pool[i].name}` : `#${pool[i].no}`;
        const fontSize = Math.max(16, Math.min(30, 240 / Math.sqrt(pool.length)));
        cctx.font = `700 ${fontSize}px Inter, Arial`;
        cctx.translate(radius - 26, 0);
        cctx.rotate(Math.PI / 2);

        const maxWidth = radius * 0.72;
        let output = text;
        while (cctx.measureText(output).width > maxWidth && output.length > 12) {
          output = output.slice(0, -2);
        }
        if (output !== text) output = output.trim() + '...';

        cctx.fillText(output, 0, 0);
        cctx.restore();
      }

      cctx.beginPath();
      cctx.arc(0, 0, radius * 0.12, 0, Math.PI * 2);
      cctx.fillStyle = 'rgba(255,255,255,0.9)';
      cctx.fill();
      cctx.restore();

      return cached;
    }

    function ensureWheelCache(pool = filteredPlayers) {
      const key = getWheelCacheKey(pool);
      if (key !== wheelCacheKey || !wheelCacheCanvas) {
        wheelCacheCanvas = buildWheelCache(pool);
        wheelCacheKey = key;
      }
    }

    function drawWheel(pool = filteredPlayers) {
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      ctx.clearRect(0, 0, w, h);
      ensureWheelCache(pool);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      ctx.drawImage(wheelCacheCanvas, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    function sizeCanvasToContainer() {
      const rect = wheelWrap.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      const displaySize = Math.max(220, Math.floor(Math.min(rect.width, rect.height)));
      const internalSize = Math.floor(displaySize * dpr);

      canvas.style.width = `${displaySize}px`;
      canvas.style.height = `${displaySize}px`;

      if (canvas.width !== internalSize || canvas.height !== internalSize) {
        canvas.width = internalSize;
        canvas.height = internalSize;
        wheelCacheKey = '';
      }
    }

    function getFilteredPlayers() {
      const q = normalizeText(searchInput.value || '');
      if (!q) return [...players];
      return players.filter(p => {
        return normalizeText(p.name).includes(q) || String(p.no).includes(q);
      });
    }

    function updateFiltered() {
      filteredPlayers = getFilteredPlayers();
      filteredCount.textContent = filteredPlayers.length;
      renderList();
      wheelCacheKey = '';
      drawWheel(filteredPlayers);
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spin(pool) {
      if (spinning || !pool.length) return;
      spinning = true;
      spinBtn.disabled = true;
      spinSearchBtn.disabled = true;
      resetBtn.disabled = true;

      const targetIndex = Math.floor(Math.random() * pool.length);
      const sliceAngle = (Math.PI * 2) / pool.length;

      // Pointer is at 12 o'clock. Need selected slice midpoint to end there.
      const targetMid = targetIndex * sliceAngle + sliceAngle / 2;
      const current = rotation % (Math.PI * 2);
      const extraSpins = (Math.PI * 2) * (5 + Math.random() * 2.5);
      const desired = (-targetMid) - current;
      const finalRotation = rotation + extraSpins + desired;
      const startRotation = rotation;
      const duration = 5200;
      const start = performance.now();

      function animate(now) {
        const elapsed = now - start;
        const t = Math.min(1, elapsed / duration);
        rotation = startRotation + (finalRotation - startRotation) * easeOutCubic(t);
        drawWheel(pool);

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          rotation = finalRotation;
          drawWheel(pool);
          const winner = pool[targetIndex];
          winnerName.textContent = winner.name;
          winnerMeta.textContent = `Hacker #${winner.no}`;
          spinning = false;
          spinBtn.disabled = false;
          spinSearchBtn.disabled = false;
          resetBtn.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    spinBtn.addEventListener('click', () => spin(players));
    spinSearchBtn.addEventListener('click', () => spin(filteredPlayers));

    resetBtn.addEventListener('click', () => {
      rotation = 0;
      winnerName.textContent = 'Ready to spin';
      winnerMeta.textContent = `${players.length} loaded`;
      searchInput.value = '';
      filteredPlayers = [...players];
      updateFiltered();
    });

    searchInput.addEventListener('input', updateFiltered);

    window.addEventListener('resize', () => {
      sizeCanvasToContainer();
      drawWheel(filteredPlayers);
    });

    totalCount.textContent = players.length;
    sizeCanvasToContainer();
    updateFiltered();
  </script>
</body>
</html>
