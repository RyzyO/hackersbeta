<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Hackers Cup | Players</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/site-nav.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              hackers: {
                dark: '#0f172a', navy: '#1e3a5f', sky: '#0ea5e9',
                light: '#38bdf8', gold: '#f59e0b', surface: '#1e293b',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'slide-up': 'slideUp 0.6s ease-out',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
            }
          }
        }
      }
    </script>
    <link rel="manifest" href="site.webmanifest">
    <style>
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }

      .glass-card {
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
      }
      .loader {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #38bdf8;
        border-radius: 50%;
        width: 40px; height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }

      .bottom-nav {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 50;
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Search */
      .search-wrap { position: relative; }
      .search-input {
        width: 100%;
        background: rgba(2, 6, 23, 0.6);
        border: 1px solid rgba(56, 189, 248, 0.22);
        color: #f8fafc;
        border-radius: 1rem;
        padding: .95rem 1rem .95rem 3rem;
        font-weight: 600;
        outline: none;
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      .search-input::placeholder { color: #64748b; font-weight: 500; }
      .search-input:focus {
        border-color: rgba(56, 189, 248, 0.7);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
      }
      .search-icon {
        position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
        color: #38bdf8; pointer-events: none;
      }

      /* Player cards */
      .player-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: .9rem;
      }
      .player-card {
        display: flex; align-items: center; gap: .9rem;
        background: rgba(14, 25, 41, 0.55);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 1rem;
        padding: .9rem 1rem;
        cursor: pointer;
        text-align: left;
        width: 100%;
        transition: border-color .2s ease, transform .2s ease, background .2s ease;
      }
      .player-card:hover {
        border-color: rgba(56,189,248,0.4);
        transform: translateY(-2px);
        background: rgba(14, 25, 41, 0.8);
      }
      .player-avatar {
        width: 52px; height: 52px; flex-shrink: 0;
        border-radius: 9999px;
        padding: 2px;
        background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 45%, #f59e0b 100%);
      }
      .player-avatar-inner {
        width: 100%; height: 100%;
        border-radius: 9999px;
        background: #0f172a;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Kanit', sans-serif; font-style: italic; font-weight: 700;
        font-size: 1.25rem; color: #38bdf8; text-transform: uppercase;
        overflow: hidden;
      }
      .player-avatar-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 9999px; }
      .player-name { font-weight: 700; color: #f8fafc; line-height: 1.25; word-break: break-word; }
      .player-nickname { font-size: .78rem; font-style: italic; color: #38bdf8; margin-top: .1rem; line-height: 1.2; }
      .player-sub { font-size: .76rem; color: #94a3b8; margin-top: .15rem; }

      /* Skeleton */
      .skel {
        position: relative; overflow: hidden;
        background: rgba(255,255,255,0.06);
        border-radius: 8px;
      }
      .skel::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        animation: shimmer 1.6s infinite;
      }
      @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

      .no-data {
        color: #94a3b8; font-size: .9rem; text-align: center;
        padding: 1.5rem;
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: .75rem; width: 100%;
      }

      /* ---------- Detail (read-only profile) view ---------- */
      .profile-avatar-ring {
        width: 96px; height: 96px; border-radius: 9999px;
        background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 45%, #f59e0b 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 3px; box-shadow: 0 12px 32px rgba(14,165,233,0.25); flex-shrink: 0;
      }
      .profile-avatar-inner {
        width: 100%; height: 100%; border-radius: 9999px; background: #0f172a;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Kanit', sans-serif; font-style: italic; font-weight: 700;
        font-size: 2rem; color: #38bdf8; text-transform: uppercase; overflow: hidden;
      }
      .profile-avatar-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 9999px; }
      .name-nickname { font-style: italic; font-weight: 600; color: #38bdf8; }
      .hacker-tag {
        display: inline-flex; align-items: center; gap: .4rem;
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: #fbbf24; font-weight: 600; font-size: .8rem;
        padding: .3rem .75rem; border-radius: 9999px; letter-spacing: 0.02em;
      }
      .stat-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 1rem; overflow: hidden;
      }
      .stat-cell { background: rgba(15, 23, 42, 0.55); padding: 1.1rem .75rem; text-align: center; }
      .stat-cell .num {
        font-family: 'Kanit', sans-serif; font-style: italic; font-weight: 700;
        font-size: 1.6rem; line-height: 1;
        background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      .stat-cell .label {
        margin-top: .35rem; font-size: .68rem; text-transform: uppercase;
        letter-spacing: 0.08em; color: #94a3b8; font-weight: 600;
      }
      .section-shell {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 1.25rem; padding: 1.5rem;
      }
      @media (min-width: 768px) { .section-shell { padding: 1.75rem 2rem; } }
      .section-heading { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; gap: .75rem; }
      .section-heading h4 { display: flex; align-items: center; gap: .55rem; font-size: 1.05rem; font-weight: 700; }
      .section-heading .icon-chip {
        width: 30px; height: 30px; border-radius: 8px;
        background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .badges { display: flex; gap: .55rem; flex-wrap: wrap; justify-content: center; align-items: center; }
      .badge {
        display: inline-flex; align-items: center; gap: .45rem;
        color: #04263b; border-radius: 9999px; padding: .45rem 1rem;
        font-size: .82rem; font-weight: 600; border: 1px solid transparent;
      }
      .badge i { width: 15px; height: 15px; }
      .badge.total { background: linear-gradient(90deg,#f59e0b,#facc15); color: #1c1206; }
      .badge.consec { background: linear-gradient(90deg,#10b981,#059669); color: #04261c; }
      .years-row { display: flex; flex-wrap: wrap; gap: .55rem; justify-content: center; }
      .year-chip {
        background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.18);
        color: #bae6fd; font-weight: 700; font-size: .82rem;
        padding: .4rem .85rem; border-radius: .6rem;
      }
      #honoursList { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: .9rem; }
      .honour-card {
        background: rgba(14, 25, 41, 0.55); border: 1px solid rgba(255,255,255,0.06);
        padding: 1rem; border-radius: .9rem; display: flex; gap: .85rem; align-items: flex-start;
        transition: border-color .2s ease, transform .2s ease;
      }
      .honour-card:hover { border-color: rgba(245,158,11,0.35); transform: translateY(-2px); }
      .honour-card .icon-box {
        width: 42px; height: 42px; border-radius: .6rem;
        background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245,158,11,0.2);
        display: flex; align-items: center; justify-content: center; color: #f59e0b; flex-shrink: 0;
      }
      .honour-card .meta { color: #94a3b8; font-size: .76rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
      .honour-card .title { font-weight: 700; margin-top: .3rem; font-size: .95rem; line-height: 1.35; }
      .honour-card .loc-row { display: flex; align-items: center; gap: .3rem; margin-top: .45rem; color: #94a3b8; font-size: .82rem; }
      .back-btn {
        display: inline-flex; align-items: center; gap: .4rem;
        color: #cbd5e1; font-weight: 600; font-size: .9rem;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        border-radius: .7rem; padding: .5rem .9rem; cursor: pointer;
        transition: background .15s ease, color .15s ease;
      }
      .back-btn:hover { background: rgba(56,189,248,0.12); color: #fff; }
      @media (max-width: 640px) {
        #honoursList { grid-template-columns: 1fr; }
        .stat-cell .num { font-size: 1.3rem; }
      }
    </style>
  </head>
  <body class="bg-hackers-dark text-white font-sans antialiased pb-24">

  <!-- Navigation -->
  <div id="site-nav-root"></div>
  <script src="assets/js/site-nav.js"></script>

  <section class="relative pt-24 pb-16 md:pt-32 md:pb-20 overflow-hidden hero-gradient">
    <div class="absolute inset-0 opacity-20">
      <div class="absolute inset-0" style="background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.18) 1px, transparent 0); background-size: 40px 40px;"></div>
    </div>

    <div class="relative max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6">

      <!-- ============ DIRECTORY VIEW ============ -->
      <div id="directoryView">
        <div class="glass-card rounded-3xl p-6 md:p-8 animate-fade-in">
          <h1 class="text-2xl md:text-3xl font-bold mb-1.5">Player Directory</h1>

          <div class="search-wrap">
            <i data-lucide="search" class="w-5 h-5 search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name…" autocomplete="off">
          </div>
          <p class="text-xs text-gray-500 mt-3" id="resultCount"></p>
        </div>

        <div id="playerGrid" class="player-grid mt-6">
          <!-- skeletons -->
          <div class="player-card"><div class="player-avatar skel"></div><div class="flex-1"><div class="skel h-4 w-24 mb-2"></div><div class="skel h-3 w-16"></div></div></div>
          <div class="player-card"><div class="player-avatar skel"></div><div class="flex-1"><div class="skel h-4 w-24 mb-2"></div><div class="skel h-3 w-16"></div></div></div>
          <div class="player-card"><div class="player-avatar skel"></div><div class="flex-1"><div class="skel h-4 w-24 mb-2"></div><div class="skel h-3 w-16"></div></div></div>
          <div class="player-card"><div class="player-avatar skel"></div><div class="flex-1"><div class="skel h-4 w-24 mb-2"></div><div class="skel h-3 w-16"></div></div></div>
        </div>
      </div>

      <!-- ============ DETAIL VIEW ============ -->
      <div id="detailView" style="display:none;">
        <button type="button" class="back-btn mb-4" id="backBtn">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to directory
        </button>

        <div class="glass-card rounded-3xl p-6 md:p-8 animate-fade-in">
          <div class="flex flex-col sm:flex-row items-center sm:items-start gap-5 mb-6">
            <div class="profile-avatar-ring">
              <div class="profile-avatar-inner" id="dAvatar">H</div>
            </div>
            <div class="flex-1 text-center sm:text-left">
              <h2 class="text-2xl md:text-3xl font-bold mb-1.5" id="dName">Loading…</h2>
              <div class="flex flex-wrap items-center gap-2 justify-center sm:justify-start" id="dTagRow"></div>
            </div>
          </div>
          <div class="stat-grid">
            <div class="stat-cell"><div class="num" id="dEvents">–</div><div class="label">Events Attended</div></div>
            <div class="stat-cell"><div class="num" id="dLast">–</div><div class="label">Last Attended</div></div>
            <div class="stat-cell"><div class="num" id="dHonours">–</div><div class="label">Honours Earned</div></div>
          </div>

        <div class="section-shell animate-slide-up mt-6" id="dStreaksSection">
          <div class="section-heading"><h4><span class="icon-chip"><i data-lucide="flame" class="w-4 h-4 text-hackers-sky"></i></span>Attendance Streaks</h4></div>
          <div class="badges" id="dBadges"></div>
        </div>

        <div class="section-shell animate-slide-up mt-6">
          <div class="section-heading"><h4><span class="icon-chip"><i data-lucide="calendar-days" class="w-4 h-4 text-hackers-sky"></i></span>Years Attended</h4></div>
          <div class="years-row" id="dYears"></div>
        </div>

        <div class="section-shell animate-slide-up mt-6">
          <div class="section-heading">
            <h4><span class="icon-chip"><i data-lucide="award" class="w-4 h-4 text-hackers-gold"></i></span>Awards &amp; Honours</h4>
          </div>
          <div id="honoursList" class="mt-1"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- Bottom Nav -->
  <div class="bottom-nav md:hidden">
    <div class="flex justify-around items-center h-16 pb-safe">
      <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-white">
        <i data-lucide="home" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">Home</span>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAYat6m3-Lv46vfm6xcHLjTjRDq7NdCxAk",
      authDomain: "hackers-cup.firebaseapp.com",
      databaseURL: "https://hackers-cup-default-rtdb.firebaseio.com",
      projectId: "hackers-cup",
      storageBucket: "hackers-cup.appspot.com",
      messagingSenderId: "765736070872",
      appId: "1:765736070872:web:86a51c41916e7af75631ad",
      measurementId: "G-6E1M14F510"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let allPlayers = [];       // [{ name, data }]
    const playerMap = {};      // name -> data
    const nicknameMap = {};    // normalized display name -> nickname

    const normName = (s) => (s || '').toString().toLowerCase().replace(/\s+/g, ' ').trim();
    const nicknameFor = (name) => nicknameMap[normName(name)] || '';

    const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])));

    // ---------- Directory rendering ----------
    function initialOf(name) { return (name || 'H').trim().charAt(0).toUpperCase(); }

    function playerCardHtml(name, data) {
      const avatar = data.avatarUrl
        ? `<img src="${esc(data.avatarUrl)}" alt="${esc(name)}">`
        : esc(initialOf(name));
      const events = data.eventsAttended || (Array.isArray(data.attendedYears) ? data.attendedYears.length : 0) || 0;
      const last = data.lastAttended ? `Last HC${esc(data.lastAttended)}` : 'No events yet';
      const nickname = nicknameFor(name);
      const nicknameHtml = nickname ? `<div class="player-nickname">“${esc(nickname)}”</div>` : '';
      return `
        <button type="button" class="player-card" data-name="${esc(name)}">
          <div class="player-avatar"><div class="player-avatar-inner">${avatar}</div></div>
          <div class="min-w-0 flex-1">
            <div class="player-name">${esc(name)}</div>
            ${nicknameHtml}
            <div class="player-sub">${events} event${events == 1 ? '' : 's'} · ${last}</div>
          </div>
        </button>`;
    }

    function renderGrid(list) {
      const grid = document.getElementById('playerGrid');
      const count = document.getElementById('resultCount');
      if (!list.length) {
        grid.innerHTML = `<div class="no-data">No players found.</div>`;
        count.textContent = '';
        return;
      }
      grid.innerHTML = list.map(p => playerCardHtml(p.name, p.data)).join('');
      count.textContent = `${list.length} player${list.length === 1 ? '' : 's'}`;
      lucide.createIcons();
    }

    function applyFilter() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const list = q
        ? allPlayers.filter(p =>
            p.name.toLowerCase().includes(q) ||
            nicknameFor(p.name).toLowerCase().includes(q))
        : allPlayers;
      renderGrid(list);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilter);

    document.getElementById('playerGrid').addEventListener('click', (e) => {
      const card = e.target.closest('.player-card');
      if (card && card.dataset.name) showDetail(card.dataset.name, true);
    });

    // ---------- Detail (read-only profile) rendering ----------
    function isAttendanceString(s) {
      if (!s) return false;
      const t = (s + '').trim();
      if (/^\d+\s*(year|years|yrs|yr)?$/i.test(t)) return true;
      if (/^\d+\s*consecutive$/i.test(t)) return true;
      if (/consec/i.test(t) && /\d+/.test(t)) return true;
      if (/[0-9]/.test(t) && (/year/i.test(t) || /yr\b/i.test(t) || /consec|consecutive/i.test(t))) return true;
      return false;
    }
    function makeKey(catRaw, txtRaw) {
      let cat = (catRaw || '').toString();
      let txt = (txtRaw || '').toString();
      if (cat === txt || !txt) {
        const parts = cat.split(/[-–—:]\s*/);
        if (parts.length >= 2) { cat = parts[0]; txt = parts.slice(1).join(' - '); }
        else { txt = cat; cat = ''; }
      }
      cat = cat.toLowerCase().replace(/\s+/g, ' ').trim();
      txt = txt.toLowerCase().replace(/\s+/g, ' ').trim();
      if (cat && txt.startsWith(cat)) { txt = txt.slice(cat.length).trim().replace(/^[-–—:\s]+/, ''); }
      txt = txt.replace(/\bhc\s*\d+\b/i, '').trim();
      return `${cat}|${txt}`;
    }

    function renderBadges(data) {
      const el = document.getElementById('dBadges');
      const section = document.getElementById('dStreaksSection');
      const isAnniv = b => /^\s*(5|10|15|20|25)\s*(year|years|yrs|yr)?\s*$/i.test(b);
      const total = (data.totalBadges || []).filter(b => !isAnniv(b));
      const consec = (data.consecutiveBadges || []).filter(b => !isAnniv(b));
      const items = [];
      total.forEach(b => items.push(`<span class="badge total"><i data-lucide="flame" class="w-4 h-4"></i>${esc(b)}</span>`));
      consec.forEach(b => items.push(`<span class="badge consec"><i data-lucide="trending-up" class="w-4 h-4"></i>${esc(b)}</span>`));
      if (!items.length) { section.style.display = 'none'; return; }
      section.style.display = '';
      el.innerHTML = items.join('');
    }

    function renderYears(data) {
      const el = document.getElementById('dYears');
      const years = Array.isArray(data.attendedYears) ? data.attendedYears.slice() : [];
      if (!years.length) { el.innerHTML = `<div class="no-data">No events attended yet.</div>`; return; }
      el.innerHTML = years.sort((a, b) => a - b).map(y => `<span class="year-chip">HC${esc(y)}</span>`).join('');
    }

    function buildHonours(data) {
      const honours = Array.isArray(data.honours) ? data.honours.slice() : [];
      const otherAwards = Array.isArray(data.otherAwards) ? data.otherAwards.slice() : [];
      const attendanceNumbers = new Set();
      (data.totalBadges || []).concat(data.consecutiveBadges || []).forEach(b => {
        const m = (b + '').match(/(\d+)/g);
        if (m) m.forEach(n => attendanceNumbers.add(n));
      });
      const passes = txt => {
        if (isAttendanceString(txt)) return false;
        for (const n of attendanceNumbers) if (new RegExp(`\\b${n}\\b`).test(txt)) return false;
        return true;
      };
      const filtered = honours.filter(h => passes((h.category || h.text || '').toString()));
      const filteredOther = otherAwards.filter(a => passes(a)).map(a => ({ category: a, text: a }));
      const merged = filtered.concat(filteredOther);
      const map = new Map();
      for (const h of merged) {
        const key = makeKey(h.category, h.text);
        if (map.has(key)) {
          const ex = map.get(key);
          ['eventId', 'year', 'location'].forEach(f => { if (h[f] && !ex[f]) ex[f] = h[f]; });
        } else { map.set(key, Object.assign({}, h)); }
      }
      return Array.from(map.values());
    }

    function renderHonours(data) {
      const el = document.getElementById('honoursList');
      const combined = buildHonours(data);
      document.getElementById('dHonours').textContent = combined.length;
      if (!combined.length) { el.innerHTML = `<p class="no-data">No honours recorded yet.</p>`; return; }
      combined.sort((a, b) => (b.year || 0) - (a.year || 0));
      el.innerHTML = combined.map(h => {
        const year = h.year || '';
        const eventId = h.eventId ? `HC${esc(h.eventId)}` : '';
        const category = h.category || h.text || 'Award';
        const text = h.text || category;
        const location = h.location
          ? `<div class="loc-row"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i>${esc(h.location)}</div>` : '';
        return `
          <article class="honour-card">
            <div class="icon-box"><i data-lucide="award" class="w-5 h-5"></i></div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2 flex-wrap">
                <div class="meta">${[esc(year), eventId].filter(Boolean).join(' · ')}</div>
                <div class="meta">${esc(category)}</div>
              </div>
              <div class="title">${esc(text)}</div>
              ${location}
            </div>
          </article>`;
      }).join('');
    }

    function renderDetail(name, data) {
      const nickname = nicknameFor(name);
      // Insert the nickname between the first and last name, e.g. John “Ace” Smith.
      const nameEl = document.getElementById('dName');
      if (nickname) {
        const parts = name.trim().split(/\s+/);
        const first = parts.shift();
        const rest = parts.join(' ');
        const nick = `<span class="name-nickname">“${esc(nickname)}” </span>`;
        nameEl.innerHTML = rest
          ? `${esc(first)} ${nick} ${esc(rest)}`
          : `${esc(first)} ${nick}`;
      } else {
        nameEl.textContent = name;
      }
      const avatarEl = document.getElementById('dAvatar');
      if (data.avatarUrl) avatarEl.innerHTML = `<img src="${esc(data.avatarUrl)}" alt="${esc(name)}">`;
      else avatarEl.textContent = initialOf(name);

      const tagRow = document.getElementById('dTagRow');
      const events = data.eventsAttended || (Array.isArray(data.attendedYears) ? data.attendedYears.length : 0) || 0;
      tagRow.innerHTML = data.lastAttended
        ? `<span class="hacker-tag"><i data-lucide="calendar-check" class="w-3.5 h-3.5"></i>&nbsp;Last seen HC${esc(data.lastAttended)}</span>` : '';

      document.getElementById('dEvents').textContent = events || '0';
      document.getElementById('dLast').textContent = data.lastAttended ? `HC${esc(data.lastAttended)}` : '—';

      renderBadges(data);
      renderYears(data);
      renderHonours(data);
      lucide.createIcons();
    }

    function showDetail(name, pushState) {
      const data = playerMap[name];
      if (!data) return;
      document.getElementById('directoryView').style.display = 'none';
      document.getElementById('detailView').style.display = '';
      renderDetail(name, data);
      window.scrollTo({ top: 0 });
      if (pushState) {
        const url = new URL(window.location);
        url.searchParams.set('player', name);
        history.pushState({ player: name }, '', url);
      }
    }

    function showDirectory(pushState) {
      document.getElementById('detailView').style.display = 'none';
      document.getElementById('directoryView').style.display = '';
      if (pushState) {
        const url = new URL(window.location);
        url.searchParams.delete('player');
        history.pushState({}, '', url);
      }
    }

    document.getElementById('backBtn').addEventListener('click', () => showDirectory(true));
    window.addEventListener('popstate', () => {
      const name = new URL(window.location).searchParams.get('player');
      if (name && playerMap[name]) showDetail(name, false);
      else showDirectory(false);
    });

    // ---------- Load ----------
    async function loadPlayers() {
      try {
        // Load profiles + user nicknames in parallel. Nicknames live on the
        // users/{uid} doc (displayName + nickname); profiles are keyed by name.
        const [snap, usersSnap] = await Promise.all([
          db.collection('attendeeProfiles').get(),
          db.collection('users').get().catch(() => null),
        ]);
        if (usersSnap) {
          usersSnap.forEach(u => {
            const d = u.data() || {};
            if (d.displayName && d.nickname) nicknameMap[normName(d.displayName)] = d.nickname.trim();
          });
        }
        allPlayers = [];
        snap.forEach(doc => {
          const data = doc.data() || {};
          allPlayers.push({ name: doc.id, data });
          playerMap[doc.id] = data;
        });
        allPlayers.sort((a, b) => a.name.localeCompare(b.name));
        renderGrid(allPlayers);

        // Deep-link support: ?player=Name
        const requested = new URL(window.location).searchParams.get('player');
        if (requested && playerMap[requested]) showDetail(requested, false);
      } catch (err) {
        console.error('Failed to load players:', err);
        document.getElementById('playerGrid').innerHTML =
          `<div class="no-data">Could not load players. Please try again.</div>`;
      }
    }

    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = 'login.html'; return; }
      loadPlayers();
    });

    lucide.createIcons();
  </script>
</body>
