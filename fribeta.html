<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hackers Cup 26 – Friday Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0" />
  <style>
    body { 
      font-family: system-ui; 
      background:#0f172a; 
      color:#f1f5f9; 
      padding:20px; 
      margin:0;
    }
    h1 { margin-top:0; }
    .updated { font-size:13px; opacity:0.7; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { padding:10px 6px; border-bottom:1px solid #1e293b; }
    th { color:#cbd5e1; text-align:left; font-size:14px; }
    .rank { font-weight:700; }
  </style>
<link rel="manifest" href="site.webmanifest">
</head>
<body>

<h1>Friday Leaderboard</h1>
<div class="updated" id="updated"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Pts</th>
    </tr>
  </thead>
  <tbody id="lbBody"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
      getFirestore, collection, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Client-side leaderboard calculation (replaces Cloud Functions)
    function calculateStableford(par, strokes) {
      const diff = par - strokes;
      if (diff >= 2) return 4;
      if (diff === 1) return 3;
      if (diff === 0) return 2;
      if (diff === -1) return 1;
      return 0;
    }

    function calculateLeaderboard(scorecards) {
      const leaderboard = [];
      scorecards.forEach((doc) => {
        const d = doc.data();
        let total = 0;
        for (let i = 1; i <= 18; i++) {
          const strokes = d[`hole${i}`];
          if (!strokes) continue;
          total += calculateStableford(4, strokes);
        }
        leaderboard.push({
          id: doc.id,
          name: d.playerName || doc.id,
          stablefordTotal: total,
        });
      });
      leaderboard.sort((a, b) => b.stablefordTotal - a.stablefordTotal);
      return leaderboard;
    }

    const firebaseConfig = {
      apiKey:"AIzaSyDuQNnLLtX6GrhvIbwenSGEHjWp2JOWUZ8",
      authDomain:"hackers-cup.firebaseapp.com",
      projectId:"hackers-cup"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadLeaderboard() {
      try {
        // Fetch scorecards directly (free Firestore read)
        const snap = await getDocs(
          collection(db, "competitions", "hackersCup26", "rounds", "friday", "scorecards")
        );

        const leaderboard = calculateLeaderboard(Array.from(snap.docs));

        // Update timestamp
        document.getElementById("updated").textContent =
          "Updated: " + new Date().toLocaleString();

        // Render leaderboard
        const tbody = document.getElementById("lbBody");
        tbody.innerHTML = "";

        leaderboard.forEach((r, idx) => {
          tbody.innerHTML += `
            <tr>
              <td class="rank">${idx + 1}</td>
              <td>${r.name}</td>
              <td>${r.stablefordTotal}</td>
            </tr>
          `;
        });
      } catch (error) {
        console.error("Error loading leaderboard:", error);
        document.getElementById("lbBody").innerHTML = `
          <tr><td colspan="3">Error loading leaderboard</td></tr>
        `;
      }
</script>

</body>
</html>
