  <!-- ═══ SCRIPTS ═══ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence,
      signInWithEmailAndPassword, signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import {
      getFirestore, collection, getDocs, doc, setDoc, getDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAYat6m3-Lv46vfm6xcHLjTjRDq7NdCxAk",
      authDomain: "hackers-cup.firebaseapp.com",
      databaseURL: "https://hackers-cup-default-rtdb.firebaseio.com",
      projectId: "hackers-cup",
      storageBucket: "hackers-cup.appspot.com",
      messagingSenderId: "765736070872",
      appId: "1:765736070872:web:86a51c41916e7af75631ad",
      measurementId: "G-6E1M14F510"
    };

    const EVENT_OPTIONS = [
      { id: "HC26", year: 2026 }, { id: "HC25", year: 2025 }, { id: "HC24", year: 2024 }, { id: "HC23", year: 2023 },
      { id: "HC22", year: 2022 }, { id: "HC21", year: 2021 }, { id: "HC20", year: 2019 },
      { id: "HC19", year: 2018 }, { id: "HC18", year: 2017 }, { id: "HC17", year: 2016 },
      { id: "HC16", year: 2015 }, { id: "HC15", year: 2014 }, { id: "HC14", year: 2013 },
      { id: "HC13", year: 2012 }, { id: "HC12", year: 2011 }, { id: "HC11", year: 2010 },
      { id: "HC10", year: 2009 }, { id: "HC9", year: 2008 }, { id: "HC8", year: 2007 },
      { id: "HC7", year: 2006 }
    ];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    // ── State ──
    let currentEventId = EVENT_OPTIONS[0].id;
    let users = [];
    let eventPlayers = new Map();
    let teeSheets = { friday: [], saturday: [], sunday: [] };
    let activeTeeDay = 'friday';
    let tsSelectedPlayers = [];
    let dataLoaded = false;

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    // ── Utilities ──
    function normalize(v) { return String(v || '').toLowerCase(); }
    function escapeHtml(v) {
      return String(v || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#039;');
    }
    function asString(v) { return v == null ? '' : String(v); }
    function uniqueSorted(arr) {
      return Array.from(new Set((arr||[]).filter(Boolean))).sort((a,b) => a.localeCompare(b));
    }
    function userLabel(u) {
      const n = u.displayName || '(no name)';
      return u.hackerNumber ? `${n} #${u.hackerNumber}` : n;
    }
    function currentEventConfig() { return EVENT_OPTIONS.find(e => e.id === currentEventId) || EVENT_OPTIONS[0]; }

    // ── Toast ──
    function showToast(message, type = 'info') {
      const container = $('#toastContainer');
      const colors = {
        success: 'bg-emerald-500/15 border-emerald-500/30 text-emerald-300',
        error:   'bg-red-500/15 border-red-500/30 text-red-300',
        warn:    'bg-amber-500/15 border-amber-500/30 text-amber-300',
        info:    'bg-s2 border-brd text-slate-300',
      };
      const icons = { success:'check-circle-2', error:'alert-circle', warn:'alert-triangle', info:'info' };
      const toast = document.createElement('div');
      toast.className = `pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-xl border text-sm shadow-xl backdrop-blur-md toast-in ${colors[type]||colors.info}`;
      toast.innerHTML = `<i data-lucide="${icons[type]||'info'}" class="w-4 h-4 shrink-0"></i><span>${message}</span>`;
      container.appendChild(toast);
      lucide.createIcons({ nodes: [toast] });
      setTimeout(() => {
        toast.classList.replace('toast-in','toast-out');
        toast.addEventListener('animationend', () => toast.remove());
      }, 3500);
    }

    function setTsStatus(msg = '', type = '') {
      const el = $('#tsStatus');
      if (!el) return;
      el.textContent = msg;
      el.className = 'text-[11px] hidden sm:block max-w-[180px] truncate ' +
        (type==='error' ? 'text-red-400' : type==='success' ? 'text-emerald-400' : type==='warn' ? 'text-amber-400' : 'text-slate-500');
    }

    // ── Data helpers ──
    function normalizeEventRecord(uid, data = {}, fallbackUser = null) {
      return {
        ambrosePartnerUid: asString(data.ambrosePartnerUid),
        skins: !!data.skins,
        coming: !!data.coming,
        saturdayAttendance: data.saturdayAttendance == null ? true : !!data.saturdayAttendance,
        sundayAttendance: data.sundayAttendance == null ? true : !!data.sundayAttendance,
        handicap: data.handicap != null
          ? Number(data.handicap)
          : (fallbackUser?.handicap != null ? Number(fallbackUser.handicap) : ''),
      };
    }

    function getEventRecord(uid) {
      return eventPlayers.get(uid) || { ambrosePartnerUid:'', skins:false, coming:false, handicap:'' };
    }

    function numericHandicapFor(uid, record) {
      const u = users.find(x => x.uid === uid);
      const raw = (record.handicap !== '' && record.handicap != null)
        ? Number(record.handicap)
        : (u?.handicap != null && u.handicap !== '' ? Number(u.handicap) : NaN);
      return Number.isFinite(raw) ? raw : null;
    }

    // ── Tee sheet helpers ──
    function tsGetHC(uid) {
      const hc = numericHandicapFor(uid, getEventRecord(uid));
      return hc !== null ? hc : 36;
    }

    function getEligibleForDay(day) {
      return users.filter(u => {
        const r = getEventRecord(u.uid);
        if (day === 'friday') return !!r.coming && !!r.skins;
        if (day === 'saturday') return !!r.coming && !!r.saturdayAttendance;
        if (day === 'sunday') return !!r.coming && !!r.sundayAttendance;
        return !!r.coming;
      });
    }

    function isShotgun(day) { return day !== 'saturday'; }

    function syncShotgunTimeInput() {
      const input = $('#tsStartTime');
      if (!input || !isShotgun(activeTeeDay)) return;
      const first = teeSheets[activeTeeDay]?.[0];
      if (first?.teeTime) input.value = first.teeTime;
    }

    // Accepts "6:05", "6.05", "605", "0605", "1402", "6", "6pm", "6.05 PM", etc.
    // Without AM/PM, hours 0–11 are AM and 12–23 are PM (24-hour style).
    function parseTeeTime(s) {
      const str = String(s || '').trim().toUpperCase();
      const m = str.match(/^(\d{1,2})(?:[:.;,\-\s]?(\d{2}))?\s*(AM|PM|A|P)?\.?$/);
      if (!m) return 8 * 60;
      let h = Number(m[1]);
      const min = Number(m[2] || 0);
      if (h > 23 || min > 59) return 8 * 60;
      const mer = m[3] ? m[3][0] : '';
      if (mer === 'P' && h < 12) h += 12;
      if (mer === 'A' && h === 12) h = 0;
      return h * 60 + min;
    }

    function formatTeeTime(totalMins) {
      const h = Math.floor(totalMins/60)%24, m = totalMins%60;
      const disp = h%12===0 ? 12 : h%12;
      return `${disp}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
    }

    function parseHoleLabel(s) {
      const m = String(s||'').trim().toUpperCase().match(/^(\d{1,2})([A-Z]?)$/);
      return m ? { num: Math.min(18,Math.max(1,parseInt(m[1],10))), letter: m[2] } : { num:1, letter:'' };
    }

    function shotgunHoleLabel(startNum, startLetter, groupIndex, totalGroups) {
      if (!startLetter) return (((startNum-1+groupIndex)%18)+1);
      const groupsPerHole = Math.max(2, Math.ceil(totalGroups/18));
      const absIdx = (startLetter.charCodeAt(0)-65)+groupIndex;
      return `${(((startNum-1+Math.floor(absIdx/groupsPerHole))%18)+1)}${String.fromCharCode(65+absIdx%groupsPerHole)}`;
    }

    // Order groups by tee time (traditional) or hole label (shotgun, A before B);
    // group numbers follow this order rather than entry order.
    function sortTeeSheetGroups(day) {
      const arr = teeSheets[day];
      if (!Array.isArray(arr)) return;
      if (isShotgun(day)) {
        arr.sort((a,b) => {
          const ha = parseHoleLabel(a.hole), hb = parseHoleLabel(b.hole);
          return ha.num - hb.num || ha.letter.localeCompare(hb.letter);
        });
      } else {
        arr.sort((a,b) => parseTeeTime(a.teeTime) - parseTeeTime(b.teeTime));
      }
    }

    function tsAssignedSet() {
      return new Set(teeSheets[activeTeeDay].flatMap(g => g.players||[]));
    }

    // ── Grouping algorithms ──
    function formGroupsSnake(players) {
      if (!players.length) return [];
      const sorted = [...players].sort((a,b) => tsGetHC(a.uid)-tsGetHC(b.uid));
      const groupCount = sorted.length<=4 ? 1 : Math.ceil(sorted.length/4);
      const buckets = Array.from({length:groupCount}, ()=>[]);
      let dir=1, g=0;
      for (const p of sorted) {
        buckets[g].push(p.uid);
        g+=dir;
        if (g>=groupCount) { g=groupCount-1; dir=-1; }
        else if (g<0)      { g=0;            dir=1;  }
      }
      return buckets.filter(b=>b.length>0);
    }

    function formGroupsAmbrose(players) {
      const paired = new Set();
      const validPairs = [];
      for (const u of players) {
        if (paired.has(u.uid)) continue;
        const rec = getEventRecord(u.uid);
        const pid = rec.ambrosePartnerUid;
        if (!pid) continue;
        const pUser = players.find(p=>p.uid===pid);
        if (!pUser) continue;
        if (getEventRecord(pid).ambrosePartnerUid !== u.uid) continue;
        validPairs.push([u.uid, pid]);
        paired.add(u.uid); paired.add(pid);
      }
      validPairs.sort((a,b)=>(tsGetHC(a[0])+tsGetHC(a[1]))/2-(tsGetHC(b[0])+tsGetHC(b[1]))/2);
      const groups = [];
      let lo=0, hi=validPairs.length-1;
      while (lo<=hi) {
        if (lo===hi) { groups.push([...validPairs[lo]]); lo++; }
        else { groups.push([...validPairs[lo],...validPairs[hi]]); lo++; hi--; }
      }
      const singles = players.filter(u=>!paired.has(u.uid))
        .sort((a,b)=>tsGetHC(a.uid)-tsGetHC(b.uid)).map(u=>u.uid);
      for (let i=0; i<groups.length && singles.length>0; i++)
        while (groups[i].length<4 && singles.length>0) groups[i].push(singles.shift());
      while (singles.length>0) {
        const g=[];
        while (g.length<4 && singles.length>0) g.push(singles.shift());
        groups.push(g);
      }
      return groups;
    }

    // ── Render: stats bar ──
    function renderTsDayStats() {
      const el = $('#tsDayStats');
      if (!el) return;
      const eligible = getEligibleForDay(activeTeeDay);
      const groups = teeSheets[activeTeeDay];
      const assigned = groups.flatMap(g=>g.players||[]);
      const unCount = eligible.filter(u=>!assigned.includes(u.uid)).length;
      const dayHint = activeTeeDay==='friday' ? 'skins' : 'coming';
      const dot = `<span class="text-slate-700 px-1">·</span>`;
      el.innerHTML = `
        <span class="text-slate-400"><span class="text-white font-semibold">${eligible.length}</span> eligible <span class="text-slate-600 text-[10px]">(${dayHint})</span></span>
        ${dot}<span class="text-slate-400"><span class="text-white font-semibold">${groups.length}</span> groups</span>
        ${dot}<span class="text-slate-400"><span class="text-white font-semibold">${assigned.length}</span> assigned</span>
        ${unCount>0 ? dot+`<span class="text-amber-400 flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3 shrink-0"></i><span class="font-semibold">${unCount}</span> unassigned</span>` : ''}`;
      lucide.createIcons({ nodes: [el] });
    }

    // ── Render: pool ──
    function renderTsPool() {
      const list = $('#tsPoolList');
      const count = $('#tsPoolCount');
      if (!list) return;
      const q = normalize($('#tsPoolSearch')?.value||'');
      const eligible = getEligibleForDay(activeTeeDay);
      const assigned = tsAssignedSet();
      const filtered = eligible.filter(u=>normalize(userLabel(u)).includes(q)||normalize(u.uid).includes(q));
      if (count) count.textContent = `${eligible.length} eligible`;
      if (!filtered.length) {
        list.innerHTML = '<div class="p-4 text-xs text-slate-600 text-center">No players match.</div>';
        return;
      }
      list.innerHTML = filtered.map(user => {
        const isSel = tsSelectedPlayers.includes(user.uid);
        const isAsgn = assigned.has(user.uid) && !isSel;
        const rec = getEventRecord(user.uid);
        const hc = numericHandicapFor(user.uid, rec);
        const partner = rec.ambrosePartnerUid ? users.find(u=>u.uid===rec.ambrosePartnerUid) : null;
        const pairOk = partner && getEventRecord(partner.uid).ambrosePartnerUid===user.uid;
        return `
          <button type="button" class="w-full flex items-center justify-between px-3 py-2.5 text-left border-b border-brd last:border-b-0 transition
            ${isSel ? 'bg-accent/10' : isAsgn ? 'opacity-40 cursor-not-allowed' : 'hover:bg-s2'}"
            data-ts-pool="${escapeHtml(user.uid)}" ${isAsgn?'disabled':''}>
            <div class="min-w-0">
              <div class="text-xs font-medium text-white truncate">${escapeHtml(userLabel(user))}</div>
              <div class="flex items-center gap-2 mt-0.5">
                ${hc!==null ? `<span class="text-[10px] text-slate-500 font-mono">HC ${hc}</span>` : ''}
                ${partner ? `<span class="text-[10px] ${pairOk?'text-accent':'text-amber-400'}">${pairOk?'⇄':'→'} ${escapeHtml(partner.displayName||'?')}</span>` : ''}
                ${isAsgn ? '<span class="text-[10px] text-slate-600">In group</span>' : ''}
              </div>
            </div>
            <span class="text-[10px] px-1.5 py-0.5 rounded-full border shrink-0 ml-2 ${isSel?'border-accent/30 text-accent bg-accent/10':isAsgn?'border-slate-700 text-slate-600':'border-brd text-slate-500'}">
              ${isAsgn?'Placed':isSel?'Sel':'+'}
            </span>
          </button>`;
      }).join('');

    // ── Render: staging ──
    function renderTsStaging() {
      const area = $('#stagingArea');
      const chips = $('#tsSelectedChips');
      if (!area||!chips) return;
      if (!tsSelectedPlayers.length) { area.classList.add('hidden'); return; }
      area.classList.remove('hidden');
      chips.innerHTML = tsSelectedPlayers.map((uid,i) => {
        const u = users.find(x=>x.uid===uid);
        const hc = numericHandicapFor(uid, getEventRecord(uid));
        const name = u ? (u.displayName||'?').split(' ')[0] : uid.slice(0,6);
        return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-accent/15 border border-accent/20 text-accent text-[10px] font-medium">
          ${escapeHtml(name)}${hc!==null?` ${hc}`:''}
          <button type="button" class="leading-none hover:text-white" data-ts-desel="${i}">×</button>
        </span>`;
      }).join('');
    }

    // ── Render: groups grid ──
    function renderTsGroups() {
      const display = $('#tsGroupsDisplay');
      const unassigned = $('#tsUnassigned');
      if (!display) return;
      const isShotgunDay = isShotgun(activeTeeDay);

      sortTeeSheetGroups(activeTeeDay);
      const groups = teeSheets[activeTeeDay];
      const eligible = getEligibleForDay(activeTeeDay);
      const assignedSet = tsAssignedSet();
      const unassignedPlayers = eligible.filter(u=>!assignedSet.has(u.uid));

      // Update tab badges
      ['friday','saturday','sunday'].forEach(day => {

              <div class="text-slate-600 text-xs mt-1">Click Auto-group or select players from the sidebar</div>

          const cap = players.length;
          const capCls = cap>=4 ? 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20'
            : cap>=2 ? 'text-slate-300 bg-s3 border-brd' : 'text-amber-400 bg-amber-400/10 border-amber-400/20';

          let playersHtml = '';
          if (activeTeeDay==='sunday') {
            const done = new Set();
            for (const uid of players) {
              if (done.has(uid)) continue;
              const rec = getEventRecord(uid);
              const pid = rec.ambrosePartnerUid;
              const prec = pid ? getEventRecord(pid) : null;
              const confirmed = pid && players.includes(pid) && prec?.ambrosePartnerUid===uid;
              if (confirmed) {
                done.add(uid); done.add(pid);
                const u1=users.find(x=>x.uid===uid), u2=users.find(x=>x.uid===pid);
                const h1=numericHandicapFor(uid,rec), h2=numericHandicapFor(pid,prec);
                const teamHc = h1!==null&&h2!==null ? ((h1+h2)/4).toFixed(2) : null;
                const pi1=players.indexOf(uid), pi2=players.indexOf(pid);
                playersHtml += `
                  <div class="rounded-lg border border-blue-500/25 bg-blue-500/5 px-2.5 py-2 mb-1.5 last:mb-0">
                    <div class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-1.5">Pair${teamHc?' · Team HC '+teamHc:''}</div>
                    <div class="flex items-center justify-between py-0.5">
                      <div class="min-w-0 flex items-center gap-1.5">
                        <span class="text-xs font-medium text-white truncate">${escapeHtml(u1?.displayName||'?')}</span>
                        ${h1!==null?`<span class="text-[10px] text-slate-500 font-mono shrink-0">HC ${h1}</span>`:''}
                      </div>
                      <button type="button" class="text-[10px] text-slate-600 hover:text-red-400 transition ml-2 shrink-0 w-4 h-4 flex items-center justify-center" data-ts-rem-player="${gi},${pi1}">✕</button>
                    </div>
                    <div class="flex items-center justify-between py-0.5">
                      <div class="min-w-0 flex items-center gap-1.5">
                        <span class="text-xs font-medium text-white truncate">${escapeHtml(u2?.displayName||'?')}</span>
                        ${h2!==null?`<span class="text-[10px] text-slate-500 font-mono shrink-0">HC ${h2}</span>`:''}
                      </div>
                      <button type="button" class="text-[10px] text-slate-600 hover:text-red-400 transition ml-2 shrink-0 w-4 h-4 flex items-center justify-center" data-ts-rem-player="${gi},${pi2}">✕</button>
                    </div>
                  </div>`;
              } else {
                done.add(uid);
                const u=users.find(x=>x.uid===uid), hc=numericHandicapFor(uid,rec), pi=players.indexOf(uid);
                playersHtml += `
                  <div class="flex items-center justify-between py-1.5 border-b border-brd/40 last:border-b-0">
                    <div class="min-w-0 flex items-center gap-1.5">
                      <span class="text-xs font-medium text-white truncate">${escapeHtml(u?.displayName||uid.slice(0,8))}</span>
                      ${hc!==null?`<span class="text-[10px] text-slate-500 font-mono shrink-0">HC ${hc}</span>`:''}
                      <span class="text-[10px] text-amber-400 shrink-0">no pair</span>
                    </div>
                    <button type="button" class="text-[10px] text-slate-600 hover:text-red-400 transition ml-2 shrink-0 w-4 h-4 flex items-center justify-center" data-ts-rem-player="${gi},${pi}">✕</button>
                  </div>`;
              }
            }
          } else {
            playersHtml = players.map((uid,pi) => {
              const u=users.find(x=>x.uid===uid), rec=getEventRecord(uid), hc=numericHandicapFor(uid,rec);
              return `
                <div class="flex items-center justify-between py-1.5 border-b border-brd/40 last:border-b-0">
                  <div class="min-w-0 flex items-center gap-1.5">
                    <span class="text-xs font-medium text-white truncate">${escapeHtml(u?.displayName||uid.slice(0,8))}</span>
                    ${hc!==null?`<span class="text-[10px] text-slate-500 font-mono shrink-0">HC ${hc}</span>`:''}
                  </div>
                  <button type="button" class="text-[10px] text-slate-600 hover:text-red-400 transition ml-2 shrink-0 w-4 h-4 flex items-center justify-center" data-ts-rem-player="${gi},${pi}">✕</button>
                </div>`;
            }).join('');
          }

          return `
            <div class="bg-s1 border border-brd rounded-xl overflow-hidden flex flex-col" data-ts-group="${gi}">
              <div class="flex items-center justify-between px-3 pt-3 pb-2">
                <div class="flex items-center gap-2">
                  <span class="w-6 h-6 rounded-md bg-accent/15 border border-accent/20 flex items-center justify-center text-[10px] font-bold text-accent shrink-0">${gi+1}</span>
                  <span class="text-[11px] font-semibold text-slate-300">Group ${gi+1}</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[10px] px-1.5 py-0.5 rounded-full border font-mono ${capCls}">${cap}/4</span>
                  <button type="button" data-ts-del-group="${gi}"
                    class="w-5 h-5 rounded flex items-center justify-center text-[11px] text-slate-600 hover:text-red-400 hover:bg-red-400/10 transition">✕</button>
                </div>
              </div>
              <div class="flex items-center gap-3 px-3 pb-2.5 border-b border-brd">
                <div class="flex items-center gap-1.5">
                  <span class="text-[10px] text-slate-600 shrink-0">Hole</span>
                  <input type="text" maxlength="3" value="${escapeHtml(asString(group.hole||1))}"
                    class="w-14 px-2 py-1.5 rounded-lg bg-s2 border border-brd text-white text-xs text-center focus:outline-none focus:border-accent transition ts-group-hole" data-gi="${gi}" />
                </div>
                <span class="text-slate-700 text-xs">·</span>
                <div class="flex items-center gap-1.5">
                  <span class="text-[10px] text-slate-600 shrink-0">Time</span>
                  ${isShotgunDay
                    ? `<span class="w-[88px] px-2 py-1.5 rounded-lg bg-s2/40 border border-brd/40 text-slate-500 text-xs text-center font-mono select-none block">${escapeHtml(asString(group.teeTime||''))}</span>`
                    : `<input type="text" value="${escapeHtml(asString(group.teeTime||''))}" class="w-[88px] px-2 py-1.5 rounded-lg bg-s2 border border-brd text-white text-xs text-center focus:outline-none focus:border-accent transition ts-group-time" data-gi="${gi}" />`
                  }
                </div>
              </div>
              <div class="px-3 py-2 flex-1">
                ${playersHtml||'<div class="text-xs text-slate-600 py-2">No players</div>'}
              </div>
              <div class="px-3 py-2 bg-s0/40 border-t border-brd/50 flex items-center justify-between">
                <span class="text-[10px] text-slate-600">Avg HC ${avgHC}</span>
                ${tsSelectedPlayers.length && cap<4 ? `
                  <button type="button" data-ts-add-to="${gi}"
                    class="text-[10px] px-2 py-1 rounded-lg bg-accent/15 border border-accent/30 text-accent font-semibold hover:bg-accent/25 transition">
                    + Add ${Math.min(tsSelectedPlayers.length, 4-cap)} here
                  </button>` : ''}
              </div>
            </div>`;
        }).join('');
      }

      // Unassigned bar
      if (unassigned) {
        if (unassignedPlayers.length>0) {
          unassigned.className = 'flex items-start gap-3 bg-amber-500/10 border border-amber-500/20 rounded-xl p-3 mb-3';
          unassigned.innerHTML = `
            <i data-lucide="alert-triangle" class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"></i>
            <div class="min-w-0">
              <div class="text-xs font-semibold text-amber-400 mb-1.5">${unassignedPlayers.length} player${unassignedPlayers.length!==1?'s':''} not yet placed — click to stage</div>
              <div class="flex flex-wrap gap-1.5">
                ${unassignedPlayers.map(u=>`
                  <button type="button" data-ts-stage="${escapeHtml(u.uid)}"
                    class="text-[11px] px-2.5 py-0.5 rounded-full bg-amber-500/15 border border-amber-500/20 text-amber-300 hover:bg-amber-500/25 transition">
                    ${escapeHtml(userLabel(u))}
                  </button>`).join('')}
              </div>
            </div>`;
          unassigned.classList.remove('hidden');
          lucide.createIcons({ nodes: [unassigned] });
        } else {
          unassigned.className = 'hidden';
          unassigned.innerHTML = '';
        }
      }
    }

    function renderTeeSheet() {
      renderTsDayStats();
      renderTsPool();
      renderTsStaging();
      renderTsGroups();
    }

    // ── Switch day ──
    function switchTeeDay(day) {
      activeTeeDay = day;
      tsSelectedPlayers = [];
      $$('.ts-day-tab').forEach(btn => {
        const active = btn.dataset.tsDay === day;
        btn.classList.toggle('active', active);
      });
      const shotgun = isShotgun(day);
      const badge = $('#tsFormatBadge');
      const intervalWrap = $('#tsIntervalWrap');
      if (badge) badge.textContent = shotgun ? 'Shotgun' : 'Traditional';
      if (intervalWrap) intervalWrap.style.display = shotgun ? 'none' : '';
      const stl = $('#tsStartTimeLabel'), shl = $('#tsStartHoleLabel');
      if (stl) stl.textContent = shotgun ? 'Shotgun Time' : 'First Tee Time';
      if (shl) shl.textContent = shotgun ? 'Starting Hole' : 'Starting Hole';
      syncShotgunTimeInput();
      renderTeeSheet();
    }

    // ── Auto-group ──
    function autoGroupForDay() {
      const players = getEligibleForDay(activeTeeDay);
      if (!players.length) { setTsStatus('No eligible players for this day.','warn'); return; }
      const startMins = parseTeeTime($('#tsStartTime')?.value);
      const interval = Math.max(1, Number($('#tsInterval')?.value)||8);
      const { num:startNum, letter:startLetter } = parseHoleLabel($('#tsStartHole')?.value);
      const shotgun = isShotgun(activeTeeDay);
      const groupUids = activeTeeDay==='sunday' ? formGroupsAmbrose(players) : formGroupsSnake(players);
      teeSheets[activeTeeDay] = groupUids.map((uids,i)=>({
        hole: shotgun ? shotgunHoleLabel(startNum,startLetter,i,groupUids.length) : startNum,
        teeTime: shotgun ? formatTeeTime(startMins) : formatTeeTime(startMins+i*interval),
        players: uids,
      }));
      tsSelectedPlayers = [];
      renderTeeSheet();
      const fmt = shotgun ? 'shotgun' : 'traditional';
      setTsStatus(`${players.length} players → ${teeSheets[activeTeeDay].length} groups (${fmt}).`, 'success');
      showToast(`Auto-grouped ${players.length} players into ${teeSheets[activeTeeDay].length} groups`, 'success');
    }

    // ── Manual group ──
    function tsAddManualGroup() {
      if (!tsSelectedPlayers.length) { showToast('Select at least one player.','warn'); return; }
      if (tsSelectedPlayers.length>4) { showToast('Max 4 players per group.','warn'); return; }
      const hole = $('#tsManualHole')?.value.trim()||'1';
      const rawTime = $('#tsManualTime')?.value.trim()||'';
      const teeTime = rawTime ? formatTeeTime(parseTeeTime(rawTime)) : '';
      teeSheets[activeTeeDay].push({ hole, teeTime, players:[...tsSelectedPlayers] });
      tsSelectedPlayers = [];
      if ($('#tsManualHole')) $('#tsManualHole').value='';
      if ($('#tsManualTime')) $('#tsManualTime').value='';
      renderTeeSheet();
      showToast('Group added.','success');
      saveTeeSheets();
    }

    // ── Firebase: load/save ──
    async function loadTeeSheets() {
      try {
        setTsStatus('Loading tee sheets…');
        const snap = await getDoc(doc(firestore,'eventYears',currentEventId));
        const saved = (snap.exists() ? snap.data()||{} : {}).teeSheets||{};
        teeSheets = {
          friday:   Array.isArray(saved.friday)   ? saved.friday   : [],
          saturday: Array.isArray(saved.saturday) ? saved.saturday : [],
          sunday:   Array.isArray(saved.sunday)   ? saved.sunday   : [],
        };
        // Normalize any previously saved times (e.g. "6.05", "0605") to "6:05 AM" style
        ['friday','saturday','sunday'].forEach(day => teeSheets[day].forEach(g => {
          const raw = asString(g.teeTime||'').trim();
          if (raw) g.teeTime = formatTeeTime(parseTeeTime(raw));
        }));
        syncShotgunTimeInput();
        renderTeeSheet();
        const total = teeSheets.friday.length+teeSheets.saturday.length+teeSheets.sunday.length;
        setTsStatus(total ? `Loaded — ${total} groups total.` : 'No tee sheets saved yet.', total?'success':'warn');
      } catch (err) {
        console.error(err);
        setTsStatus('Load failed: '+err.message,'error');
        showToast('Load failed','error');
      }
    }

    async function saveTeeSheets() {
      const btn = $('#saveBtn');
      if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
      try {
        await setDoc(doc(firestore,'eventYears',currentEventId), {
          eventId: currentEventId,
          teeSheets: { friday:teeSheets.friday, saturday:teeSheets.saturday, sunday:teeSheets.sunday },
          updatedAt: serverTimestamp(),
        }, { merge:true });
        setTsStatus('Saved.','success');
        showToast('Tee sheets saved','success');
      } catch (err) {
        console.error(err);
        setTsStatus('Save failed: '+err.message,'error');
        showToast('Save failed','error');
      } finally {
        if (btn) { btn.disabled=false; btn.innerHTML='<i data-lucide="save" class="w-3.5 h-3.5"></i> Save'; lucide.createIcons({nodes:[btn]}); }
      }
    }

    // ── PDF export ──
    async function exportTeeSheetPdf(day) {
      sortTeeSheetGroups(day);
      const groups = teeSheets[day];
      if (!groups||!groups.length) { showToast(`No ${day} groups to export.`,'warn'); return; }
      const btn = $('#exportPdfBtn');
      const origHtml = btn?.innerHTML||'';
      if (btn) { btn.disabled=true; btn.textContent='Generating…'; }
      const cfg = currentEventConfig();
      const eventLabel = `Hackers Cup ${cfg.id.replace('HC','')}`;
      const meta = {
        friday:   { label:'Friday',   format:'Shotgun Start · Skins',         shotgun:true  },
        saturday: { label:'Saturday', format:'Traditional Start · Stableford', shotgun:false },
        sunday:   { label:'Sunday',   format:'Shotgun Start · Ambrose Pairs',  shotgun:true  },
      }[day];
      const totalPlayers = groups.flatMap(g=>g.players||[]).length;
      const shotgunTime = meta.shotgun&&groups[0]?.teeTime ? groups[0].teeTime : null;

      function pRow(uid) {
        const u=users.find(x=>x.uid===uid), rec=getEventRecord(uid), hc=numericHandicapFor(uid,rec);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;">
          <span style="font-size:13px;font-weight:600;color:#111827;">${escapeHtml(u?(u.displayName||'(no name)'):uid.slice(0,8))}</span>
          <span style="font-size:11px;color:#6b7280;font-family:monospace,sans-serif;">${hc!==null?'HC '+hc:'—'}</span>
        </div>`;
      }

      function groupCard(group, gi) {
        const players = group.players||[];
        let playersHtml = '';
        if (day==='sunday') {
          const done=new Set();
          for (const uid of players) {
            if (done.has(uid)) continue;
            const rec=getEventRecord(uid), pid=rec.ambrosePartnerUid, prec=pid?getEventRecord(pid):null;
            const confirmed = pid&&players.includes(pid)&&prec?.ambrosePartnerUid===uid;
            if (confirmed) {
              done.add(uid); done.add(pid);
              const u1=users.find(x=>x.uid===uid), u2=users.find(x=>x.uid===pid);
              const h1=numericHandicapFor(uid,rec), h2=numericHandicapFor(pid,prec);
              const teamHc = h1!==null&&h2!==null ? ((h1+h2)/4).toFixed(2) : null;
              playersHtml += `
                <div style="background:#eff6ff;border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:3px solid #3b82f6;">
                  <div style="font-size:9px;font-weight:700;color:#1d4ed8;letter-spacing:.08em;margin-bottom:5px;text-transform:uppercase;">Pair${teamHc?' · Team HC '+teamHc:''}</div>
                  <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
                    <span style="font-size:13px;font-weight:600;color:#111827;">${escapeHtml(u1?.displayName||'?')}</span>
                    <span style="font-size:11px;color:#6b7280;font-family:monospace,sans-serif;">${h1!==null?'HC '+h1:'—'}</span>
                  </div>
                  <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:13px;font-weight:600;color:#111827;">${escapeHtml(u2?.displayName||'?')}</span>
                    <span style="font-size:11px;color:#6b7280;font-family:monospace,sans-serif;">${h2!==null?'HC '+h2:'—'}</span>
                  </div>
                </div>`;
            } else { done.add(uid); playersHtml+=pRow(uid); }
          }
        } else { playersHtml=players.map(pRow).join(''); }

        const holeTag = group.hole ? `<span style="display:inline-block;font-size:10px;background:#eff6ff;color:#1d4ed8;padding:2px 8px;border-radius:4px;font-weight:700;margin-right:4px;">Hole ${group.hole}</span>` : '';
        const timeTag = !meta.shotgun&&group.teeTime ? `<span style="display:inline-block;font-size:10px;background:#eff6ff;color:#1d4ed8;padding:2px 8px;border-radius:4px;font-weight:700;">${escapeHtml(asString(group.teeTime))}</span>` : '';
        return `
          <div style="background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:14px;break-inside:avoid;box-shadow:0 1px 4px rgba(0,0,0,.06);">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #f3f4f6;">
              <div>
                <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#3b82f6;margin-bottom:4px;">Group ${gi+1}</div>
                <div>${holeTag}${timeTag}</div>
              </div>
            </div>
            ${playersHtml}
          </div>`;
      }

      const cols = groups.length<=4 ? 2 : 3;
      const headerSub = meta.shotgun&&shotgunTime ? `${meta.format} — Shotgun ${shotgunTime}` : meta.format;
      const dateStr = new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      const html = `
        <div style="font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f8fafc;width:794px;">
          <div style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);padding:28px 36px 22px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div>
                <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#3b82f6;font-weight:700;margin-bottom:6px;">${eventLabel}</div>
                <div style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.15;">${meta.label} Tee Sheet</div>
                <div style="font-size:11px;color:#94a3b8;margin-top:6px;">${headerSub}</div>
              </div>
              <div style="text-align:right;padding-top:2px;">
                <div style="font-size:13px;font-weight:700;color:#f1f5f9;">${groups.length} groups · ${totalPlayers} players</div>
                <div style="font-size:11px;color:#64748b;margin-top:3px;">Worrigee Links</div>
                <div style="font-size:11px;color:#64748b;margin-top:2px;">${dateStr}</div>
              </div>
            </div>
            <div style="height:2px;background:linear-gradient(90deg,#3b82f6,#60a5fa,rgba(96,165,250,0));margin-top:20px;border-radius:1px;"></div>
          </div>
          <div style="padding:20px 36px 28px;">
            <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px;">
              ${groups.map((g,i)=>groupCard(g,i)).join('')}
            </div>
          </div>
          <div style="background:#0f172a;padding:11px 36px;display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;font-weight:600;">${eventLabel} · ${meta.label} Tee Sheet</div>
            <div style="font-size:9px;color:#475569;">Worrigee Links</div>
          </div>
        </div>`;

      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;pointer-events:none;';
      wrap.innerHTML = html;
      document.body.appendChild(wrap);
      try {
        await document.fonts.ready;
        const el = wrap.firstElementChild;
        const canvas = await html2canvas(el,{scale:3,useCORS:true,backgroundColor:'#f8fafc',logging:false,width:794,height:el.scrollHeight,windowWidth:794});
        const {jsPDF} = window.jspdf;
        const pdf = new jsPDF({orientation:'portrait',unit:'pt',format:'a4'});
        const pdfW=pdf.internal.pageSize.getWidth(), pdfH=pdf.internal.pageSize.getHeight();
        const pxPerPt=canvas.width/pdfW, pageHeightPx=Math.round(pdfH*pxPerPt);
        const totalPages=Math.ceil(canvas.height/pageHeightPx);
        for (let i=0;i<totalPages;i++) {
          if (i>0) pdf.addPage();
          const srcY=i*pageHeightPx, srcH=Math.min(pageHeightPx,canvas.height-srcY);
          const pc=document.createElement('canvas');
          pc.width=canvas.width; pc.height=pageHeightPx;
          const ctx=pc.getContext('2d');
          ctx.fillStyle='#f8fafc'; ctx.fillRect(0,0,pc.width,pc.height);
          ctx.drawImage(canvas,0,srcY,canvas.width,srcH,0,0,canvas.width,srcH);
          pdf.addImage(pc.toDataURL('image/png'),'PNG',0,0,pdfW,pdfH);
        }
        pdf.save(`hackerscup-${cfg.year}-${day}-teesheet.pdf`);
        showToast(`${meta.label} tee sheet exported.`,'success');
      } catch (err) {
        console.error(err); showToast('PDF export failed: '+err.message,'error');
      } finally {
        document.body.removeChild(wrap);
        if (btn) { btn.disabled=false; btn.innerHTML=origHtml; lucide.createIcons({nodes:[btn]}); }
      }
    }

    // ── Data loading ──
    async function loadUsers() {
      const [rtdbSnap, fsSnap] = await Promise.all([
        get(ref(db,'users')),
        getDocs(collection(firestore,'users')),
      ]);
      const rtdb = rtdbSnap.exists() ? rtdbSnap.val() : {};
      const fsUsers = {};
      fsSnap.forEach(d=>{ fsUsers[d.id]=d.data()||{}; });
      users = Object.keys(rtdb).map(uid => {
        const r=rtdb[uid]||{}, f=fsUsers[uid]||{};
        return {
          uid,
          displayName: r.displayName||f.displayName||'',
          hackerNumber: f.hackerNumber||r.hackerNumber||'',
          handicap: r.handicap!=null ? Number(r.handicap) : '',
        };
      }).sort((a,b)=>normalize(a.displayName).localeCompare(normalize(b.displayName)));
    }

    async function loadEventPlayers() {
      eventPlayers = new Map();
      const snap = await getDocs(collection(firestore,'eventYears',currentEventId,'players'));
      const byUid = {};
      snap.forEach(d=>{ byUid[d.id]=d.data()||{}; });
      users.forEach(u=>{ eventPlayers.set(u.uid, normalizeEventRecord(u.uid, byUid[u.uid]||{}, u)); });
    }

    async function initialLoad() {
      try {
        setTsStatus('Loading…');
        await loadUsers();
        await loadEventPlayers();
        await loadTeeSheets();
        switchTeeDay('friday');
        $('#mainContent').style.opacity='1';
      } catch (err) {
        console.error(err);
        setTsStatus('Load failed: '+err.message,'error');
        showToast('Failed to load data','error');
      }
    }

    // ── Event select ──
    function renderEventSelect() {
      const sel = $('#eventSelect');
      if (!sel) return;
      sel.innerHTML = EVENT_OPTIONS.map(e=>
        `<option value="${e.id}" ${e.id===currentEventId?'selected':''}>${e.year} — ${e.id}</option>`
      ).join('');
    }

    // ── Scorecard Labels PDF Export (Avery J8157 — 64×24.3mm, 33/sheet, A4) ──
    // Pure jsPDF with Kanit TTF fetched from jsDelivr. No html2canvas.
    // Every position is in real mm — guaranteed no cut-off or drift.
    async function exportLabelsPdf() {
      ['friday','saturday','sunday'].forEach(sortTeeSheetGroups);
      const totalGroups = teeSheets.friday.length + teeSheets.saturday.length + teeSheets.sunday.length;
      if (totalGroups === 0) { showToast('No tee sheet data — load tee sheets first.', 'warn'); return; }

      const btn = $('#exportLabelsBtn');
      const origHtml = btn ? btn.innerHTML : '';
      const setBtn = t => { if (btn) btn.textContent = t; };
      setBtn('Loading fonts…');

      try {
        const { jsPDF } = window.jspdf;
        const cfg = currentEventConfig();

        // Avery J8157 spec (mm)
        const LW = 64, LH = 24.3;
        const ML = 7.2, MT = 14.85;
        const CP = 65.8, RP = 24.3;
        const COLS = 3, ROWS = 11;
        const PAD = 1.8;

        // Load Kanit TTF from jsDelivr (Google Fonts GitHub mirror, CORS: *)
        const FONT_BASE = 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/kanit/';
        let kanitLoaded = false;

        async function fetchFont(filename) {
          const resp = await fetch(FONT_BASE + filename);
          if (!resp.ok) throw new Error(`${filename} HTTP ${resp.status}`);
          const buf = await resp.arrayBuffer();
          const u8 = new Uint8Array(buf);
          let b64 = '';
          for (let i = 0; i < u8.length; i += 8192)
            b64 += String.fromCharCode.apply(null, u8.subarray(i, i + 8192));
          return btoa(b64);
        }

        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        try {
          const [boldB64, regB64] = await Promise.all([
            fetchFont('Kanit-Bold.ttf'),
            fetchFont('Kanit-Regular.ttf'),
          ]);
          pdf.addFileToVFS('Kanit-Bold.ttf',    boldB64);
          pdf.addFileToVFS('Kanit-Regular.ttf', regB64);
          pdf.addFont('Kanit-Bold.ttf',    'Kanit', 'bold');
          pdf.addFont('Kanit-Regular.ttf', 'Kanit', 'normal');
          kanitLoaded = true;
        } catch (e) {
          console.warn('Kanit load failed — falling back to helvetica:', e);
        }

        const FONT = kanitLoaded ? 'Kanit' : 'helvetica';

        // Load logo
        setBtn('Loading logo…');
        let logoDataUrl = null, logoAspect = 4;
        try {
          const resp = await fetch('print.png');
          if (resp.ok) {
            const blob = await resp.blob();
            logoDataUrl = await new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(blob); });
            const img = new Image(); img.src = logoDataUrl;
            await new Promise(r => { img.onload = r; img.onerror = r; });
            if (img.naturalWidth && img.naturalHeight) logoAspect = img.naturalWidth / img.naturalHeight;
          }
        } catch (e) { console.warn('Logo not loaded:', e); }

        // Build labels
        setBtn('Building labels…');
        const labels = [];

        function fmtHc(hc) {
          if (hc == null) return '';
          return Number.isInteger(hc) ? String(hc) : parseFloat(hc.toFixed(2)).toString();
        }

        // Friday — Skins
        for (const g of (teeSheets.friday || [])) {
          const teeInfo = g.hole ? `Skins: Tee-${g.hole}` : 'Skins';
          for (const uid of (g.players || [])) {
            const u = users.find(x => x.uid === uid);
            const rec = getEventRecord(uid);
            labels.push({ name: u?.displayName || '?', hc: numericHandicapFor(uid, rec), teeInfo, day: 'friday' });
          }
        }

        // Saturday — Stableford
        for (const g of (teeSheets.saturday || [])) {
          for (const uid of (g.players || [])) {
            const u = users.find(x => x.uid === uid);
            const rec = getEventRecord(uid);
            labels.push({ name: u?.displayName || '?', hc: numericHandicapFor(uid, rec), teeInfo: 'Stableford', day: 'saturday' });
          }
        }

        // Sunday — Ambrose pairs
        for (const g of (teeSheets.sunday || [])) {
          const teeInfo = g.hole ? `Ambrose: Tee ${g.hole}` : 'Ambrose';
          const players = g.players || [];
          const done = new Set();
          for (const uid of players) {
            if (done.has(uid)) continue;
            const rec = getEventRecord(uid);
            const pid = rec.ambrosePartnerUid;
            const prec = pid ? getEventRecord(pid) : null;
            const paired = pid && players.includes(pid) && prec?.ambrosePartnerUid === uid;
            if (paired) {
              done.add(uid); done.add(pid);
              const u1 = users.find(x => x.uid === uid);
              const u2 = users.find(x => x.uid === pid);
              const h1 = numericHandicapFor(uid, rec), h2 = numericHandicapFor(pid, prec);
              const teamHc = h1 != null && h2 != null ? (h1 + h2) / 4 : null;
              const fmt = u => { const p = (u?.displayName || '?').trim().split(/\s+/); return p.length >= 2 ? `${p[0][0]} ${p[p.length-1]}` : p[0]; };
              labels.push({ name: `${fmt(u1)} / ${fmt(u2)}`, hc: teamHc, teeInfo, day: 'sunday' });
            } else if (!done.has(uid)) {
              done.add(uid);
              const u = users.find(x => x.uid === uid);
              labels.push({ name: u?.displayName || '?', hc: numericHandicapFor(uid, rec), teeInfo, day: 'sunday' });
            }
          }
        }

        if (!labels.length) { showToast('No players in tee sheets.', 'warn'); return; }

        const DAY_LABEL = { friday: 'FRIDAY', saturday: 'SATURDAY', sunday: 'SUNDAY' };
        const NAVY = [26, 50, 99];

        function ellipsis(pdf, text, maxW) {
          while (pdf.getTextWidth(text) > maxW && text.length > 2)
            text = text.slice(0, -2) + '…';
          return text;
        }

        function drawLabel(x, y, label) {
          const dayName  = DAY_LABEL[label.day] || label.day.toUpperCase();
          const hcStr    = label.hc != null ? ` (${fmtHc(label.hc)})` : '';
          const maxNameW = LW - 2 * PAD;

          // Label border
          pdf.setDrawColor(210, 218, 228);
          pdf.setLineWidth(0.18);
          pdf.rect(x, y, LW, LH);

          // Logo
          const logoH = 5.5;
          const logoW = Math.min(logoH * logoAspect, 34);
          const logoY = y + PAD + 0.3;
          if (logoDataUrl) {
            pdf.addImage(logoDataUrl, x + PAD, logoY, logoW, logoH);
          } else {
            pdf.setFont(FONT, 'bold'); pdf.setFontSize(7); pdf.setTextColor(...NAVY);
            pdf.text('HACKERS CUP', x + PAD, logoY + 3.5);
          }

          // Day name — top right, bold navy
          pdf.setFont(FONT, 'bold');
          pdf.setFontSize(8);
          pdf.setTextColor(...NAVY);
          pdf.text(dayName, x + LW - PAD, logoY + 3, { align: 'right' });

          // Tee info — smaller, grey
          pdf.setFont(FONT, 'normal');
          pdf.setFontSize(6.5);
          pdf.setTextColor(95, 95, 95);
          pdf.text(label.teeInfo, x + LW - PAD, logoY + 6, { align: 'right' });

          // Separator
          const sepY = logoY + logoH + 1.5;
          pdf.setDrawColor(185, 198, 212);
          pdf.setLineWidth(0.15);
          pdf.line(x + PAD, sepY, x + LW - PAD, sepY);

          // Player name — right below separator
          pdf.setFont(FONT, 'bold');
          pdf.setFontSize(11);
          pdf.setTextColor(12, 18, 35);
          pdf.text(ellipsis(pdf, label.name + hcStr, maxNameW), x + PAD, sepY + 4.2);
        }

        // Paginate
        const totalPages = Math.ceil(labels.length / (COLS * ROWS));
        for (let p = 0; p < totalPages; p++) {
          setBtn(`Generating ${p + 1}/${totalPages}…`);
          if (p > 0) pdf.addPage();
          labels.slice(p * COLS * ROWS, (p + 1) * COLS * ROWS).forEach((lbl, i) => {
            drawLabel(ML + (i % COLS) * CP, MT + Math.floor(i / COLS) * RP, lbl);
          });
        }

        pdf.save(`hackerscup-${cfg.year}-scorecard-labels.pdf`);
        showToast(`${labels.length} labels exported, ${totalPages} page${totalPages > 1 ? 's' : ''}. Print at 100%.`, 'success');

      } catch (err) {
        console.error(err);
        showToast('Labels export failed: ' + err.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = origHtml; lucide.createIcons({ nodes: [btn] }); }
      }
    }

    // ── Event listeners ──

    // On Sunday, confirmed Ambrose partners stage and unstage together
    function confirmedPartnerUid(uid) {
      if (activeTeeDay !== 'sunday') return null;
      const pid = getEventRecord(uid).ambrosePartnerUid;
      if (!pid || getEventRecord(pid).ambrosePartnerUid !== uid) return null;
      return pid;
    }
    function stagePartner(uid) {
      const pid = confirmedPartnerUid(uid);
      if (!pid || tsSelectedPlayers.includes(pid) || tsAssignedSet().has(pid)) return;
      if (!getEligibleForDay(activeTeeDay).some(u => u.uid === pid)) return;
      tsSelectedPlayers.push(pid);
    }
    function unstagePartner(uid) {
      const pid = confirmedPartnerUid(uid);
      if (!pid) return;
      const i = tsSelectedPlayers.indexOf(pid);
      if (i >= 0) tsSelectedPlayers.splice(i, 1);
    }

    // Pool click
    $('#tsPoolList').addEventListener('click', e => {
      const btn = e.target.closest('[data-ts-pool]');
      if (!btn||btn.disabled) return;
      const uid = btn.dataset.tsPool;
      const idx = tsSelectedPlayers.indexOf(uid);
      if (idx>=0) { tsSelectedPlayers.splice(idx,1); unstagePartner(uid); }
      else { tsSelectedPlayers.push(uid); stagePartner(uid); }
      renderTsPool(); renderTsStaging(); renderTsGroups();
    });

    // Staging deselect chips
    document.addEventListener('click', e => {
      const desel = e.target.closest('[data-ts-desel]');
      if (!desel) return;
      const [uid] = tsSelectedPlayers.splice(Number(desel.dataset.tsDesel),1);
      if (uid) unstagePartner(uid);
      renderTsPool(); renderTsStaging(); renderTsGroups();
    });

    // Unassigned stage buttons
    document.addEventListener('click', e => {
      const stageBtn = e.target.closest('[data-ts-stage]');
      if (!stageBtn) return;
      const uid = stageBtn.dataset.tsStage;
      if (!tsSelectedPlayers.includes(uid)) { tsSelectedPlayers.push(uid); stagePartner(uid); }
      renderTsPool(); renderTsStaging(); renderTsGroups();
    });

    // Groups: delete group / remove player
    $('#tsGroupsDisplay').addEventListener('click', e => {
      const delGrp = e.target.closest('[data-ts-del-group]');
      if (delGrp) {
        teeSheets[activeTeeDay].splice(Number(delGrp.dataset.tsDelGroup),1);
        renderTeeSheet(); return;
      }
      const remPl = e.target.closest('[data-ts-rem-player]');
      if (remPl) {
        const [gi,pi] = remPl.dataset.tsRemPlayer.split(',').map(Number);
        teeSheets[activeTeeDay][gi].players.splice(pi,1);
        if (!teeSheets[activeTeeDay][gi].players.length) teeSheets[activeTeeDay].splice(gi,1);
        renderTeeSheet(); return;
      }
      const addTo = e.target.closest('[data-ts-add-to]');
      if (addTo) {
        const group = teeSheets[activeTeeDay][Number(addTo.dataset.tsAddTo)];
        if (!group) return;
        if (!Array.isArray(group.players)) group.players = [];
        const assigned = tsAssignedSet();
        const added = [];
        for (const uid of tsSelectedPlayers) {
          if (group.players.length >= 4) break;
          if (assigned.has(uid)) continue;
          group.players.push(uid); added.push(uid);
        }
        if (!added.length) { showToast('Group is full.','warn'); return; }
        tsSelectedPlayers = tsSelectedPlayers.filter(u=>!added.includes(u));
        renderTeeSheet();
        showToast(`Added ${added.length} player${added.length!==1?'s':''} to group.`,'success');
        return;
      }
    });

    // Inline hole/time edits
    document.addEventListener('change', e => {
      if (e.target.classList.contains('ts-group-hole')) {
        teeSheets[activeTeeDay][Number(e.target.dataset.gi)].hole = e.target.value.trim();
        renderTsGroups();
      }
      if (e.target.classList.contains('ts-group-time')) {
        const raw = e.target.value.trim();
        teeSheets[activeTeeDay][Number(e.target.dataset.gi)].teeTime = raw ? formatTeeTime(parseTeeTime(raw)) : '';
        renderTsGroups();
      }
      if (e.target.id === 'tsStartTime') {
        const newTime = formatTeeTime(parseTeeTime(e.target.value));
        e.target.value = newTime;
        if (isShotgun(activeTeeDay)) {
          teeSheets[activeTeeDay].forEach(g => { g.teeTime = newTime; });
          renderTsGroups();
        }
      }
    });

    // Day tabs
    $$('.ts-day-tab').forEach(btn => btn.addEventListener('click', ()=>switchTeeDay(btn.dataset.tsDay)));

    // Header buttons
    $('#autoGroupBtn').addEventListener('click', autoGroupForDay);
    $('#clearDayBtn').addEventListener('click', ()=>{
      if (!teeSheets[activeTeeDay].length) return;
      if (!confirm(`Clear all ${teeSheets[activeTeeDay].length} groups for ${activeTeeDay}?`)) return;
      teeSheets[activeTeeDay]=[]; tsSelectedPlayers=[];
      renderTeeSheet(); setTsStatus('Day cleared.','warn');
    });
    $('#loadBtn').addEventListener('click', async ()=>{
      await loadEventPlayers(); await loadTeeSheets();
    });
    $('#saveBtn').addEventListener('click', saveTeeSheets);
    $('#exportPdfBtn').addEventListener('click', ()=>exportTeeSheetPdf(activeTeeDay));
    $('#exportLabelsBtn').addEventListener('click', exportLabelsPdf);
    $('#addGroupBtn').addEventListener('click', tsAddManualGroup);
    $('#clearStagingBtn').addEventListener('click', ()=>{ tsSelectedPlayers=[]; renderTsPool(); renderTsStaging(); renderTsGroups(); });
    $('#tsPoolSearch').addEventListener('input', renderTsPool);

    // Event select
    $('#eventSelect').addEventListener('change', async e=>{
      currentEventId = e.target.value;
      teeSheets={friday:[],saturday:[],sunday:[]}; tsSelectedPlayers=[];
      renderTeeSheet();
      try { setTsStatus('Loading…'); await loadEventPlayers(); await loadTeeSheets(); }
      catch(err){ setTsStatus('Load failed: '+err.message,'error'); }
    });

    // Settings modal
    const settingsModal = $('#settingsModal');
    $('#settingsBtn').addEventListener('click', ()=>{ settingsModal.style.display='flex'; });
    $('#settingsCloseBtn').addEventListener('click', ()=>{ settingsModal.style.display='none'; });
    settingsModal.addEventListener('click', e=>{ if(e.target===settingsModal) settingsModal.style.display='none'; });

    // ── Auth ──
    const signinBtn = $('#signinBtn');
    const signinEmail = $('#signinEmail');
    const signinPassword = $('#signinPassword');
    const signInStatus = $('#signInStatus');
    const signInOverlay = $('#signInOverlay');
    const authBar = $('#authBar');
    const authEmailSpan = $('#authEmail');

    signinBtn.addEventListener('click', async ()=>{
      const email=signinEmail.value.trim(), password=signinPassword.value;
      if (!email||!password) { signInStatus.textContent='Enter email and password.'; return; }
      signinBtn.disabled=true; signinBtn.textContent='Signing in…'; signInStatus.textContent='';
      try { await signInWithEmailAndPassword(auth,email,password); }
      catch(err) {
        signInStatus.textContent=err.message||'Sign in failed.';
        signInStatus.className='mt-3 text-center text-sm text-red-400';
        signinBtn.disabled=false; signinBtn.textContent='Sign in';
      }
    });
    signinPassword.addEventListener('keydown', e=>{ if(e.key==='Enter') signinBtn.click(); });
    $('#signOutBtn').addEventListener('click', async ()=>{ try{await signOut(auth);}catch(e){console.error(e);} });

    setPersistence(auth, browserLocalPersistence).catch(e=>console.warn('Auth persistence:',e));

    async function verifyAdmin(user) {
      const snap = await get(ref(db,`admins/${user.uid}`));
      return !!snap.val();
    }

    // ── Boot ──
    renderEventSelect();
    switchTeeDay('friday');

    onAuthStateChanged(auth, async user=>{
      if (!user) {
        signInOverlay.classList.remove('hidden');
        signInOverlay.style.display='';
        authBar.classList.add('hidden');
        return;
      }
      try {
        const allowed = await verifyAdmin(user);
        if (!allowed) {
          signInOverlay.classList.remove('hidden');
          signInOverlay.style.display='';
          signInStatus.textContent='Access denied — admin privileges required';
          signInStatus.className='mt-3 text-center text-sm text-red-400';
          authBar.classList.add('hidden');
          return;
        }
      } catch(err) { console.error(err); showToast('Failed to verify admin access','error'); return; }

      signInOverlay.style.display='none';
      authBar.classList.remove('hidden');
      authEmailSpan.textContent=user.email||user.uid;

      if (!dataLoaded) { dataLoaded=true; await initialLoad(); }
    });

    lucide.createIcons();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</body>
</html>
