<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hackers Cup 25</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">

<script type="module">
  // ── CONFIG ──────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8reFuNFbRmKGdpLkdFc9b88WMJwc4hguNCVi1hQyCeQEezZYRVWiMc46idCcYpMAc/exec';
  // ── END CONFIG ──────────────────────────────────────────────

  function proxiedAppScriptUrl(url) {
    return `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
  }

  async function fetchJsonViaProxy(url, options) {
    const response = await fetch(proxiedAppScriptUrl(url), options);
    const text = await response.text();

    if (!response.ok) {
      throw new Error(text || `Request failed with status ${response.status}`);
    }

    try {
      return JSON.parse(text);
    } catch (err) {
      throw new Error(`Expected JSON but received: ${text.slice(0, 120)}`);
    }
  }

  // ── STATE ────────────────────────────────────────────────────
  let selectedSheetNames = []; // up to 4 sheet/tab names selected for scoring
  let allSheetNames      = [];
  let holeData        = [];   // array of hole objects from Apps Script
  let players         = [];   // array of { sheetName, name, holes: [], scores: {rowIndex:score} }
  let scores          = {};   // legacy single-player map (kept for compatibility)
  let roundHoles      = [];   // hole order for the active round
  let currentHoleIndex = 0;
  let startHoleNumber  = null;
  let saveTimer        = null;

  // ── DOM HELPERS ──────────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const show = id => $(id).classList.remove('hidden');
  const hide = id => $(id).classList.add('hidden');

  async function loadSheetNames() {
    try {
      const data = await fetchJsonViaProxy(`${APPS_SCRIPT_URL}?action=getSheetNames`);
      if (!data.success) throw new Error(data.error || 'Unable to load sheet names');
      allSheetNames = data.sheets || [];
      renderSheetSearch($('input-sheet-search').value.trim());

      const urlSheet = new URLSearchParams(window.location.search).get('sheet');
      if (urlSheet) {
        const exact = allSheetNames.find(name => name.toLowerCase() === urlSheet.toLowerCase());
        if (exact) selectSheet(exact);
      }
    } catch (err) {
      $('login-error').textContent = err.message;
      $('login-helper').textContent = 'Enter a sheet name manually if needed.';
    }
  }

  function renderSheetSearch(query) {
    const results = $('sheet-results');
    if (!results) return;

    results.innerHTML = '';
    if (!allSheetNames.length) {
      results.innerHTML = '<div class="sheet-empty">Loading sheet list…</div>';
      return;
    }

    const normalized = query.toLowerCase();
    const matches = allSheetNames.filter(name => name.toLowerCase().includes(normalized));

    if (!matches.length) {
      results.innerHTML = '<div class="sheet-empty">No matching sheets</div>';
      return;
    }

    matches.forEach(name => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'sheet-option';
      button.textContent = name;
      button.onclick = () => toggleSelectSheet(name, button);
      // mark selected
      if (selectedSheetNames.includes(name)) button.classList.add('mode-btn', 'active');
      results.appendChild(button);
    });
    renderSelectedList();
  }

  function renderSelectedList() {
    const el = $('selected-list');
    if (!el) return;
    el.innerHTML = '';
    selectedSheetNames.forEach(name => {
      const chip = document.createElement('div');
      chip.style.padding = '6px 10px';
      chip.style.background = 'rgba(30,41,59,0.7)';
      chip.style.border = '1px solid var(--border)';
      chip.style.borderRadius = '999px';
      chip.style.fontSize = '13px';
      chip.style.color = 'var(--text)';
      chip.textContent = name;
      el.appendChild(chip);
    });
  }

  function toggleSelectSheet(name, btnEl) {
    const idx = selectedSheetNames.indexOf(name);
    if (idx >= 0) {
      selectedSheetNames.splice(idx, 1);
      if (btnEl) btnEl.classList.remove('mode-btn', 'active');
    } else {
      if (selectedSheetNames.length >= 4) {
        $('login-error').textContent = 'You can select up to 4 players.';
        return;
      }
      selectedSheetNames.push(name);
      if (btnEl) btnEl.classList.add('mode-btn', 'active');
      $('login-error').textContent = '';
    }
    renderSelectedList();
  }

  function selectSheet(name) {
    // legacy: direct open of a single sheet — toggle into selected list and start
    toggleSelectSheet(name);
  }

  window.startScoring = function() {
    if (!selectedSheetNames.length) {
      $('login-error').textContent = 'Select at least one player to score.';
      return;
    }

    // Prepare player placeholders
    players = selectedSheetNames.map(name => ({ sheetName: name, name, holes: [], scores: {} }));
    scores = {};
    roundHoles = [];
    currentHoleIndex = 0;
    startHoleNumber = null;
    hide('screen-login');
    show('screen-loading');
    loadHoles();
  };

  window.searchSheets = function() {
    renderSheetSearch($('input-sheet-search').value.trim());
  };

  window.openSelectedSheet = function() {
    const query = $('input-sheet-search').value.trim();
    if (!query) {
      $('login-error').textContent = 'Enter a sheet name';
      return;
    }

    const exact = allSheetNames.find(name => name.toLowerCase() === query.toLowerCase());
    if (exact) {
      selectSheet(exact);
      return;
    }

    const partial = allSheetNames.find(name => name.toLowerCase().includes(query.toLowerCase()));
    if (partial) {
      selectSheet(partial);
      return;
    }

    $('login-error').textContent = 'No sheet found with that name';
  };

  window.handleSignOut = function() {
    selectedSheetNames = [];
    holeData = [];
    roundHoles = [];
    currentHoleIndex = 0;
    startHoleNumber = null;
    players = [];
    scores = {};
    $('sheet-label').textContent = '';
    $('login-helper').textContent = 'Search for a sheet tab in the workbook.';
    $('input-sheet-search').value = '';
    $('sheet-results').innerHTML = '';
    $('selected-list').innerHTML = '';
    $('hole-view').innerHTML = '';
    hide('start-hole-overlay');
    hide('screen-scoring');
    hide('screen-loading');
    show('screen-login');
    $('login-helper').textContent = 'Select up to 4 players, then tap Start Round.';
  };

  // ── SCORING SCREEN ────────────────────────────────────────────
  function initScoringScreen() {
    loadHoles();
  }

  async function loadHoles() {
    // Multi-player flow: fetch hole template from first sheet, then fetch per-player holes
    if (!players || !players.length) {
      hide('screen-loading');
      show('screen-login');
      return;
    }

    $('sheet-label').textContent  = players.map(p => p.name).join(' • ');
    show('scorecard-loading');
    hide('hole-view');
    hide('round-nav');

    try {
      // Use the first selected sheet to get canonical hole order and pars
      const templateResp = await fetchJsonViaProxy(`${APPS_SCRIPT_URL}?action=getHoles&sheet=${encodeURIComponent(players[0].sheetName)}`);
      if (!templateResp.success) throw new Error(templateResp.error);
      holeData = templateResp.holes;

      // For each player, fetch their sheet holes to get currentScore and sheet points
      await Promise.all(players.map(async (p, pidx) => {
        const resp = await fetchJsonViaProxy(`${APPS_SCRIPT_URL}?action=getHoles&sheet=${encodeURIComponent(p.sheetName)}`);
        if (!resp.success) throw new Error(resp.error || `Failed to load ${p.sheetName}`);
        p.holes = resp.holes || [];
        p.scores = {};
        p.holes.forEach(h => {
          if (h.currentScore !== '' && h.currentScore !== null && h.currentScore !== undefined) {
            p.scores[h.rowIndex] = h.currentScore;
          }
        });
      }));

      roundHoles = [...holeData].sort((a, b) => Number(a.hole) - Number(b.hole));
      renderStartHolePicker();
      hide('scorecard-loading');
      hide('screen-loading');
      show('screen-scoring');
    } catch (err) {
      $('scorecard-loading').textContent = '⚠ ' + err.message;
      hide('screen-loading');
      show('screen-scoring');
    }
  }

  function renderStartHolePicker() {
    const overlay = $('start-hole-overlay');
    const grid = $('start-hole-grid');
    if (!overlay || !grid) return;

    const uniqueHoles = [...new Set(roundHoles.map(h => Number(h.hole)))].sort((a, b) => a - b);
    grid.innerHTML = '';
    uniqueHoles.forEach(holeNumber => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'start-hole-btn';
      button.textContent = holeNumber;
      button.onclick = () => startRoundAtHole(holeNumber);
      grid.appendChild(button);
    });

    overlay.classList.remove('hidden');
  }

  function startRoundAtHole(holeNumber) {
    startHoleNumber = Number(holeNumber);
    const startIndex = roundHoles.findIndex(h => Number(h.hole) === startHoleNumber);
    currentHoleIndex = startIndex >= 0 ? startIndex : 0;
    $('start-hole-overlay').classList.add('hidden');
    $('hole-view').classList.remove('hidden');
    $('round-nav').classList.remove('hidden');
    $('btn-submit').classList.remove('hidden');
    renderCurrentHole();
  }

  function getCurrentHole() {
    if (!roundHoles.length) return null;
    return roundHoles[currentHoleIndex] || roundHoles[0];
  }

  function getPlayerScoreSummary(player) {
    let frontPoints = 0;
    let backPoints = 0;

    holeData.forEach(h => {
      const score = player.scores[h.rowIndex];
      const pts = getPointsFromData((player.holes || []).find(ph => ph.rowIndex === h.rowIndex) || h, score);
      if (score !== undefined) {
        if (h.front) frontPoints += Number(pts ?? 0);
        else backPoints += Number(pts ?? 0);
      }
    });

    return { frontPoints, backPoints, totalPoints: frontPoints + backPoints };
  }

  function getActiveHoleLabel() {
    const hole = getCurrentHole();
    if (!hole) return '';
    return `Hole ${hole.hole}`;
  }

  function renderCurrentHole() {
    const hole = getCurrentHole();
    const view = $('hole-view');
    if (!hole || !view) return;

    const totalHoles = roundHoles.length;
    const currentNumber = currentHoleIndex + 1;
    const navLabel = `${currentNumber} / ${totalHoles}`;

    const playerCards = players.map((player, pidx) => {
      const playerHole = (player.holes || []).find(ph => ph.rowIndex === hole.rowIndex) || hole;
      const existing = player.scores[hole.rowIndex] ?? '';
      const pts = getPointsFromData(playerHole, existing);
      const summary = getPlayerScoreSummary(player);

      return `
        <div class="player-card">
          <div class="player-card-head">
            <div>
              <div class="player-name">${player.name}</div>
              <div class="player-summary">${summary.totalPoints} pts</div>
            </div>
            <div class="player-points" id="points-${pidx}-${hole.rowIndex}">${getPointsLabel(pts)}</div>
          </div>
          <div class="score-controls score-controls-mobile">
            <button class="score-btn minus" onclick="adjustScoreForPlayer(${pidx}, ${hole.rowIndex}, -1)">−</button>
            <input
              class="score-input"
              id="score-${pidx}-${hole.rowIndex}"
              type="number"
              inputmode="numeric"
              min="1" max="20"
              value="${existing}"
              placeholder="—"
              onchange="setScoreForPlayer(${pidx}, ${hole.rowIndex}, this.value)"
            />
            <button class="score-btn plus" onclick="adjustScoreForPlayer(${pidx}, ${hole.rowIndex}, 1)">+</button>
          </div>
        </div>
      `;
    }).join('');

    view.innerHTML = `
      <div class="hole-card">
        <div class="hole-card-top">
          <div>
            <div class="hole-eyebrow">Hole ${hole.hole}</div>
            <div class="hole-title">Par ${hole.par}</div>
          </div>
          <div class="hole-progress">${navLabel}</div>
        </div>
        <div class="hole-body">
          ${playerCards}
        </div>
      </div>
    `;

    updateTotals();
  }

  function moveHole(delta) {
    if (!roundHoles.length) return;
    currentHoleIndex = (currentHoleIndex + delta + roundHoles.length) % roundHoles.length;
    renderCurrentHole();
  }

  function setSaveStatus(message, kind) {
    const status = $('save-status');
    if (!status) return;

    status.textContent = message || '';
    status.classList.remove('save-status-saving', 'save-status-saved', 'save-status-error');

    if (kind) {
      status.classList.add(`save-status-${kind}`);
    }
  }

  async function autosaveScore(rowIndex) {
    // Deprecated: use per-player autosave instead
    return;
  }

  window.setScore = function(rowIndex, val) {
    // legacy single-player handler — forward to first player if present
    const n = parseInt(val);
    if (!players || !players.length) {
      if (!isNaN(n) && n >= 1 && n <= 20) scores[rowIndex] = n;
      else delete scores[rowIndex];
      const hole = holeData.find(h => h.rowIndex === rowIndex);
      const pointsCell = $(`points-${rowIndex}`);
      if (pointsCell && hole) pointsCell.innerHTML = getPointsLabel(getPointsFromData(hole, scores[rowIndex]));
      updateTotals();
      return;
    }
    // apply to first player
    setScoreForPlayer(0, rowIndex, val);
  };

  window.adjustScore = function(rowIndex, delta) {
    // legacy single-player handler — forward to first player
    if (!players || !players.length) {
      const hole = holeData.find(h => h.rowIndex === rowIndex);
      const current = scores[rowIndex] ?? hole.par;
      const next = Math.max(1, Math.min(20, current + delta));
      scores[rowIndex] = next;
      const input = $(`score-${rowIndex}`);
      if (input) input.value = next;
      const pointsCell = $(`points-${rowIndex}`);
      if (pointsCell && hole) pointsCell.innerHTML = getPointsLabel(getPointsFromData(hole, next));
      updateTotals();
      return;
    }
    adjustScoreForPlayer(0, rowIndex, delta);
  };

  // Per-player handlers
  window.setScoreForPlayer = async function(playerIndex, rowIndex, val) {
    const n = parseInt(val);
    const player = players[playerIndex];
    if (!player) return;
    if (!isNaN(n) && n >= 1 && n <= 20) player.scores[rowIndex] = n;
    else delete player.scores[rowIndex];

    const hole = holeData.find(h => h.rowIndex === rowIndex);
    const playerHole = (player.holes || []).find(ph => ph.rowIndex === rowIndex) || {};
    const pointsCell = $(`points-${playerIndex}-${rowIndex}`);
    if (pointsCell && hole) pointsCell.innerHTML = getPointsLabel(getPointsFromData(playerHole, player.scores[rowIndex]));
    updateTotals();
    await autosaveScoreForPlayer(playerIndex, rowIndex);
  };

  window.adjustScoreForPlayer = async function(playerIndex, rowIndex, delta) {
    const player = players[playerIndex];
    if (!player) return;
    const hole = holeData.find(h => h.rowIndex === rowIndex);
    const current = player.scores[rowIndex] ?? hole.par;
    const next = Math.max(1, Math.min(20, current + delta));
    player.scores[rowIndex] = next;
    const input = $(`score-${playerIndex}-${rowIndex}`);
    if (input) input.value = next;
    const playerHole = (player.holes || []).find(ph => ph.rowIndex === rowIndex) || {};
    const pointsCell = $(`points-${playerIndex}-${rowIndex}`);
    if (pointsCell && hole) pointsCell.innerHTML = getPointsLabel(getPointsFromData(playerHole, next));
    updateTotals();
    await autosaveScoreForPlayer(playerIndex, rowIndex);
  };

  async function autosaveScoreForPlayer(playerIndex, rowIndex) {
    const player = players[playerIndex];
    if (!player || !player.sheetName) return;
    const score = player.scores[rowIndex];
    setSaveStatus('Saving...', 'saving');

    try {
      const data = await fetchJsonViaProxy(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          sheetName: player.sheetName,
          scores: [{ rowIndex: Number(rowIndex), score }]
        })
      });
      if (!data.success) throw new Error(data.error);

      // refresh that player's holes so sheet-calculated points (col M) are visible
      const resp = await fetchJsonViaProxy(`${APPS_SCRIPT_URL}?action=getHoles&sheet=${encodeURIComponent(player.sheetName)}`);
      if (resp && resp.success) {
        player.holes = resp.holes || [];
      }

      renderCurrentHole();

      setSaveStatus('Saved', 'saved');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => setSaveStatus(''), 1000);
    } catch (err) {
      console.error('Autosave failed:', err);
      setSaveStatus('Save failed', 'error');
    }
  }

  function getStablefordPoints(par, strokes) {
    if (strokes === '' || strokes === null || strokes === undefined) return null;

    const diff = Number(par) - Number(strokes);
    if (diff >= 2) return 4;
    if (diff === 1) return 3;
    if (diff === 0) return 2;
    if (diff === -1) return 1;
    return 0;
  }

  function getPointsLabel(points) {
    if (points === null || points === undefined) return '<span class="diff-empty">—</span>';
    return `<span class="points-value">${points}</span>`;
  }

  // Prefer points provided by the sheet (column M). If the API returns a
  // points value for the hole (e.g. `hole.sheetPoints` / `hole.points` / `hole.currentPoints`),
  // use that. Otherwise fall back to local Stableford calculation.
  function getPointsFromData(hole, strokes) {
    // Normalise possible fields returned by Apps Script
    const sheetVal = hole.points ?? hole.sheetPoints ?? hole.currentPoints ?? hole.pointsFromSheet ?? null;
    if (sheetVal !== null && sheetVal !== '' && sheetVal !== undefined) {
      const n = Number(sheetVal);
      return isNaN(n) ? null : n;
    }

    return getStablefordPoints(hole.par, strokes);
  }

  function updateTotals() {
    const bar = $('player-summary-bar');
    if (!bar) return;

    bar.innerHTML = '';
    players.forEach((player, index) => {
      const totals = getPlayerScoreSummary(player);
      const cell = document.createElement('div');
      cell.className = 'total-cell';
      cell.innerHTML = `
        <div class="total-label">${player.name}</div>
        <div class="total-value">${totals.totalPoints}</div>
      `;
      bar.appendChild(cell);
    });
  }

  function showError(msg) {
    console.error(msg);
    alert(msg);
  }

  window.addEventListener('DOMContentLoaded', () => {
    renderSheetSearch('');
    loadSheetNames();
  });
</script>

<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --surface2:  #1e3a5f;
    --border:    rgba(255, 255, 255, 0.1);
    --green:     #38bdf8;
    --green-dim: rgba(14, 165, 233, 0.2);
    --red:       #f59e0b;
    --gold:      #f59e0b;
    --text:      #f8fafc;
    --muted:     #cbd5e1;
    --sky:       #0ea5e9;
    --light:     #38bdf8;
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  .hidden { display: none !important; }

  /* ── SCREENS ────────────────────────────────────────── */
  .screen {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  /* ── LOGIN ──────────────────────────────────────────── */
  #screen-login {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(14, 165, 233, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(56, 189, 248, 0.14) 0%, transparent 50%),
      var(--bg);
  }

  .login-logo {
    font-family: 'Kanit', sans-serif;
    font-style: italic;
    font-size: 56px;
    letter-spacing: 1px;
    color: var(--light);
    line-height: 1;
    text-align: center;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 40px;
  }

  .login-box {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .action-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }

  .action-row .btn-primary {
    width: 100%;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input {
    background: rgba(30, 41, 59, 0.72);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus { border-color: var(--sky); }

  #login-error {
    font-size: 12px;
    color: var(--red);
    min-height: 16px;
    text-align: center;
  }

  .sheet-option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
  }

  .sheet-option:active {
    background: var(--surface2);
  }

  .sheet-empty {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 8px 0;
  }

  /* ── BUTTONS ────────────────────────────────────────── */
  .btn-primary {
    background: var(--sky);
    color: #ffffff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 16px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:active { opacity: .85; transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; }

  .btn-ghost {
    background: transparent;
    color: var(--light);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    cursor: pointer;
  }

  /* ── LOADING ────────────────────────────────────────── */
  #screen-loading {
    gap: 16px;
    color: var(--light);
    font-size: 13px;
    letter-spacing: 2px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCORING SCREEN ─────────────────────────────────── */
  #screen-scoring {
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .scoring-header {
    background: rgba(30, 41, 59, 0.82);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .header-logo {
    font-family: 'Kanit', sans-serif;
    font-style: italic;
    font-size: 22px;
    letter-spacing: 1px;

  .signout-btn {

  #player-name {

    color: var(--text);

  }

  #sheet-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  #save-status {
    margin-top: 4px;
    min-height: 14px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;

  }

  .save-status-saving {
    color: var(--gold);
  }

  .save-status-saved {
    color: var(--green);
  }

  .save-status-error {
    color: var(--red);
  }

  /* Mode toggle */
  #mode-toggle {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .mode-btn {
    flex: 1;
    background: var(--surface2);

    border-radius: 8px;

    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px;
    cursor: pointer;
    transition: all .15s;
  }

  .mode-btn.active {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  /* Totals bar */
  .totals-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 10px 0 0;
    scrollbar-width: none;
  }

  .totals-bar::-webkit-scrollbar {
    display: none;
  }

  .total-cell {
    min-width: 110px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: left;
  }

  .total-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .total-value {
    font-size: 22px;
    color: var(--text);
    font-weight: 600;
    margin-top: 4px;
  }

  /* Hole-by-hole view */
  .scorecard-wrap {
    overflow-y: auto;
    flex: 1;
    padding: 16px 16px 110px;
  }

  #hole-view {
    width: 100%;
  }

  .hole-card {
    background: rgba(30, 41, 59, 0.86);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
  }

  .hole-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .hole-eyebrow {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .hole-title {
    font-family: 'Kanit', sans-serif;
    font-style: italic;
    font-size: 44px;
    line-height: 1;
    color: var(--light);
    margin-top: 2px;
  }

  .hole-progress {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-top: 8px;
  }

  .hole-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .player-card {
    background: rgba(15, 23, 42, 0.55);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
  }

  .player-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .player-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .player-summary {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .player-points {
    text-align: right;
    font-size: 28px;
    line-height: 1;
  }

  .score-controls-mobile {
    justify-content: center;
  }

  .round-nav {
    display: flex;
    gap: 8px;
    padding: 0 16px 16px;
  }

  .hole-nav-btn {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .hole-nav-btn:disabled {
    opacity: 0.35;
  }

  .start-hole-overlay {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: rgba(2, 6, 23, 0.82);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .start-hole-card {
    width: 100%;
    max-width: 420px;
    background: rgba(15, 23, 42, 0.98);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 18px;
  }

  .start-hole-title {
    font-family: 'Kanit', sans-serif;
    font-style: italic;
    font-size: 34px;
    color: var(--light);
    line-height: 1;
  }

  .start-hole-subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .start-hole-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .start-hole-btn {
    aspect-ratio: 1;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
  }

  .start-hole-btn:active {
    background: var(--green-dim);
  }

  @media (max-width: 480px) {
    .start-hole-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .hole-title {
      font-size: 36px;
    }

    .player-points {
      font-size: 24px;
    }
  }

  #scorecard-loading {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .score-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .score-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .score-btn:active { background: var(--border); }

  .score-input {
    width: 52px;
    background: rgba(30, 41, 59, 0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 500;
    text-align: center;
    padding: 6px 4px;
    outline: none;
    appearance: textfield;
    -moz-appearance: textfield;
  }

  .score-input::-webkit-inner-spin-button,
  .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .score-input:focus { border-color: var(--sky); }

  .diff-cell {
    width: 44px;
    text-align: center;
    padding-right: 14px;
  }

  .diff-empty { color: var(--border); }
  .points-value { color: var(--light); font-weight: 700; }

  /* Submit bar */
  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    display: flex;
    justify-content: center;
  }

  .submit-bar .btn-primary {
    max-width: 600px;
  }

  /* ── SUCCESS ────────────────────────────────────────── */
  #screen-success {
    gap: 16px;
    text-align: center;
  }

  .success-icon {
    font-size: 64px;
    line-height: 1;
  }

  .success-title {
    font-family: 'Kanit', sans-serif;
    font-style: italic;
    font-size: 40px;
    letter-spacing: 1px;
    color: var(--light);
  }

  #success-detail {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    max-width: 300px;
  }

  .success-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 300px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- ── SHEET SEARCH ───────────────────────────────────────────── -->
<div id="screen-login" class="screen">
  <div class="login-logo">HACKERS CUP</div>
  <div class="login-sub">Google Sheets Stableford · 2025</div>

  <div class="login-box">
    <div class="field">
      <label for="input-sheet-search">Sheet name</label>
      <input id="input-sheet-search" type="text" autocomplete="off" autocapitalize="none"
             placeholder="Search sheets..." oninput="searchSheets()"
             onkeydown="if(event.key==='Enter') openSelectedSheet()">
    </div>
    <div id="selected-list" style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;"></div>
    <div id="login-helper" style="font-size:12px;color:var(--muted);min-height:16px;">Select up to 4 players, then tap Start Scoring.</div>
    <div id="login-error"></div>
    <div class="action-row">
      <button id="btn-login" class="btn-primary" onclick="openSelectedSheet()">ADD PLAYER</button>
      <button id="btn-start" class="btn-primary" onclick="startScoring()">START ROUND</button>
    </div>
  </div>

  <div id="sheet-results" style="width:100%;max-width:360px;margin-top:16px;display:flex;flex-direction:column;gap:8px;"></div>
</div>

<!-- ── LOADING ─────────────────────────────────────────────────── -->
<div id="screen-loading" class="screen hidden">
  <div class="spinner"></div>
  <div>LOADING</div>
</div>

<!-- ── SCORING ─────────────────────────────────────────────────── -->
<div id="screen-scoring" class="screen hidden">

  <div class="scoring-header">
    <div class="header-top">
      <div class="header-logo">⛳ HACKERS CUP</div>
      <button class="signout-btn" onclick="handleSignOut()">Change sheet</button>
    </div>
    <div id="sheet-label"></div>
    <div id="save-status"></div>

    <div class="totals-bar" id="player-summary-bar"></div>
  </div>

  <div class="scorecard-wrap">
    <div id="scorecard-loading">LOADING HOLES…</div>
    <div id="hole-view" class="hidden"></div>
  </div>

  <div class="round-nav hidden" id="round-nav">
    <button class="hole-nav-btn" onclick="moveHole(-1)">Prev Hole</button>
    <button class="hole-nav-btn" onclick="moveHole(1)">Next Hole</button>
  </div>

  <div id="start-hole-overlay" class="start-hole-overlay hidden">
    <div class="start-hole-card">
      <div class="start-hole-title">Start on which hole?</div>
      <div class="start-hole-subtitle">Pick the hole you want to begin scoring from.</div>
      <div id="start-hole-grid" class="start-hole-grid"></div>
    </div>
  </div>

</div>

</body>
</html>
