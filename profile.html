<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Hackers Cup | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/site-nav.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <!-- Tailwind Config (copied from index.html) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              hackers: {
                dark: '#0f172a',
                navy: '#1e3a5f',
                sky: '#0ea5e9',
                light: '#38bdf8',
                gold: '#f59e0b',
                surface: '#1e293b',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'slide-up': 'slideUp 0.6s ease-out',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <link rel="manifest" href="site.webmanifest">
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }

      /* .glass now lives in assets/css/site-nav.css */
      .glass-card {
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
      }

      /* Loading Spinner */
      .loader {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #38bdf8;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Hero Gradient */
      .hero-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      }

      /* Bottom Nav */
      .bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 50;
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* ============================================
         PROFILE PAGE — redesigned, theme-consistent
         ============================================ */

      /* Skeleton loading state */
      .skel {
        position: relative;
        overflow: hidden;
        background: rgba(255,255,255,0.06);
        border-radius: 8px;
        color: transparent !important;
      }
      .skel::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        animation: shimmer 1.6s infinite;
      }
      @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

      /* Identity header */
      .profile-avatar-ring {
        width: 96px; height: 96px;
        border-radius: 9999px;
        background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 45%, #f59e0b 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 3px;
        box-shadow: 0 12px 32px rgba(14,165,233,0.25);
        flex-shrink: 0;
      }
      .profile-avatar-inner {
        width: 100%; height: 100%;
        border-radius: 9999px;
        background: #0f172a;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Kanit', sans-serif;
        font-style: italic;
        font-weight: 700;
        font-size: 2rem;
        color: #38bdf8;
        text-transform: uppercase;
        overflow: hidden;
      }
      .profile-avatar-inner img {
        width: 100%; height: 100%;
        object-fit: cover;
        border-radius: 9999px;
      }
      .profile-avatar-wrap {
        position: relative;
        flex-shrink: 0;
      }
      .avatar-edit-btn {
        position: absolute;
        bottom: -2px; right: -2px;
        width: 30px; height: 30px;
        border-radius: 9999px;
        background: #0ea5e9;
        border: 2px solid #0f172a;
        display: flex; align-items: center; justify-content: center;
        color: #04263b;
        cursor: pointer;
        transition: transform .15s ease, background .15s ease;
      }
      .avatar-edit-btn:hover { transform: scale(1.08); background: #38bdf8; }
      .avatar-edit-btn i { width: 14px; height: 14px; }
      .avatar-uploading .profile-avatar-ring { opacity: .5; pointer-events: none; }
      .avatar-status {
        font-size: .72rem;
        margin-top: .4rem;
        color: #94a3b8;
        text-align: center;
      }
      .avatar-status.error { color: #fca5a5; }
      .avatar-status.success { color: #6ee7b7; }
      .hacker-tag {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: #fbbf24;
        font-weight: 600;
        font-size: .8rem;
        padding: .3rem .75rem;
        border-radius: 9999px;
        letter-spacing: 0.02em;
      }

      /* Stat strip */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 1rem;
        overflow: hidden;
      }
      .stat-cell {
        background: rgba(15, 23, 42, 0.55);
        padding: 1.1rem .75rem;
        text-align: center;
      }
      .stat-cell .num {
        font-family: 'Kanit', sans-serif;
        font-style: italic;
        font-weight: 700;
        font-size: 1.6rem;
        line-height: 1;
        background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .stat-cell .label {
        margin-top: .35rem;
        font-size: .68rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        font-weight: 600;
      }

      /* Section shell — consistent card treatment across the page */
      .section-shell {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 1.25rem;
        padding: 1.5rem;
      }
      @media (min-width: 768px) { .section-shell { padding: 1.75rem 2rem; } }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.1rem;
        gap: .75rem;
      }
      .section-heading h4 {
        display: flex;
        align-items: center;
        gap: .55rem;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .section-heading .icon-chip {
        width: 30px; height: 30px;
        border-radius: 8px;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.2);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .section-heading .count-pill {
        font-size: .72rem;
        font-weight: 700;
        color: #94a3b8;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.07);
        padding: .2rem .6rem;
        border-radius: 9999px;
      }

      /* Anniversary milestone badges */
      .anniv-track {
        display: flex;
        gap: 1.25rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .anniv-item { text-align: center; }
      .anniv-img-wrap {
        width: 84px; height: 84px;
        border-radius: 9999px;
        padding: 3px;
        background: linear-gradient(135deg, #f59e0b 0%, #facc15 100%);
        cursor: pointer;
        transition: transform .2s ease, box-shadow .2s ease;
        box-shadow: 0 10px 24px rgba(245,158,11,0.18);
      }
      .anniv-img-wrap:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 16px 32px rgba(245,158,11,0.28); }
      .anniv-img-wrap img { width: 100%; height: 100%; border-radius: 9999px; object-fit: cover; display: block; background: #0f172a; }
      .anniv-item .cap { margin-top: .5rem; font-size: .72rem; font-weight: 600; color: #cbd5e1; }

      /* Attendance badges (total / consecutive) */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: .45rem;
        background: #0ea5e9;
        color: #04263b;
        border-radius: 9999px;
        padding: .45rem 1rem;
        font-size: .82rem;
        font-weight: 600;
        box-shadow: 0 6px 16px rgba(2,6,23,0.4);
        transition: transform .15s ease, box-shadow .15s ease;
        border: 1px solid transparent;
      }
      .badge:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(2,6,23,0.5); }
      .badge i { opacity: .95; width: 15px; height: 15px; }
      .badge.total { background: linear-gradient(90deg,#f59e0b,#facc15); color: #1c1206; }
      .badge.consec { background: linear-gradient(90deg,#10b981,#059669); color: #04261c; }
      .badge--muted {
        background: rgba(255,255,255,0.04);
        color: #cbd5e1;
        box-shadow: none;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.09);
      }
      .badge--muted:hover { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: #fff; }
      .badges { display: flex; gap: .55rem; flex-wrap: wrap; justify-content: center; align-items: center; }

      /* Years attended — chip row */
      .years-row { display: flex; flex-wrap: wrap; gap: .55rem; justify-content: center; }
      .year-chip {
        background: rgba(56,189,248,0.08);
        border: 1px solid rgba(56,189,248,0.18);
        color: #bae6fd;
        font-weight: 700;
        font-size: .82rem;
        padding: .4rem .85rem;
        border-radius: .6rem;
        letter-spacing: 0.01em;
      }

      /* Honour cards */
      #honoursList { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: .9rem; }
      .honour-card {
        background: rgba(14, 25, 41, 0.55);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 1rem;
        border-radius: .9rem;
        display: flex;
        gap: .85rem;
        align-items: flex-start;
        transition: border-color .2s ease, transform .2s ease;
      }
      .honour-card:hover { border-color: rgba(245,158,11,0.35); transform: translateY(-2px); }
      .honour-card .icon-box {
        width: 42px; height: 42px;
        border-radius: .6rem;
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245,158,11,0.2);
        display: flex; align-items: center; justify-content: center;
        color: #f59e0b;
        flex-shrink: 0;
      }
      .honour-card .meta {
        color: #94a3b8;
        font-size: .76rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 600;
      }
      .honour-card .title { font-weight: 700; margin-top: .3rem; font-size: .95rem; line-height: 1.35; }
      .honour-card .loc-row { display: flex; align-items: center; gap: .3rem; margin-top: .45rem; color: #94a3b8; font-size: .82rem; }

      /* Personal details grid */
      .personal-detail-cell {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: .9rem;
        padding: .85rem 1rem;
      }
      .personal-detail-cell .pd-label {
        font-size: .68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: .4rem;
      }
      .personal-detail-cell .pd-value {
        font-size: .95rem;
        font-weight: 700;
        color: #f1f5f9;
      }
      .pd-badge {
        display: inline-flex;
        align-items: center;
        padding: .2rem .7rem;
        border-radius: 9999px;
        font-size: .78rem;
        font-weight: 700;
        border: 1px solid;
      }
      .pd-badge.yes { background: rgba(16,185,129,0.12); color: #6ee7b7; border-color: rgba(16,185,129,0.25); }
      .pd-badge.no  { background: rgba(148,163,184,0.08); color: #94a3b8; border-color: rgba(148,163,184,0.15); }

      .no-data {
        color: #94a3b8;
        font-size: .9rem;
        text-align: center;
        padding: 1.25rem;
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: .75rem;
        width: 100%;
      }

      /* smooth-scroll highlight */
      #honoursList.highlight { outline: 3px solid rgba(245,158,11,0.25); box-shadow: 0 10px 40px rgba(2,6,23,0.5); transition: outline .2s ease; border-radius: .75rem; }

      /* Badge modal */
      .badge-modal-content {
        background: rgba(15,23,42,0.95);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1.25rem;
        padding: 1.5rem;
        max-width: 92vw;
      }

      @media (max-width: 640px) {
        #honoursList { grid-template-columns: 1fr; }
        .stat-cell .num { font-size: 1.3rem; }
      }
    </style>
  </head>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAYat6m3-Lv46vfm6xcHLjTjRDq7NdCxAk",
      authDomain: "hackers-cup.firebaseapp.com",
      databaseURL: "https://hackers-cup-default-rtdb.firebaseio.com",
      projectId: "hackers-cup",
      storageBucket: "hackers-cup.appspot.com",
      messagingSenderId: "765736070872",
      appId: "1:765736070872:web:86a51c41916e7af75631ad",
      measurementId: "G-6E1M14F510"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const database = firebase.database();

    // small helper to build badge HTML (keeps markup DRY)
    function makeBadge(label, opts = {}) {
      const type = opts.type || '';
      const icon = opts.icon || 'award';
      const cls = `badge ${type ? type : ''}`.trim();
      return `<span class="${cls}"><i data-lucide="${icon}" class="w-4 h-4"></i>${label}</span>`;
    }

    function renderBadges(totalBadges, consecutiveBadges) {
      const badgeDiv = document.getElementById('badges');
      const items = [];
      // Only show non-anniversary badges (filter out 5, 10, 15, 20, 25 year text badges)
      const filteredTotal = (totalBadges || []).filter(b => !/^\s*(5|10|15|20|25)\s*(year|years|yrs|yr)?\s*$/i.test(b));
      const filteredConsec = (consecutiveBadges || []).filter(b => !/^\s*(5|10|15|20|25)\s*(year|years|yrs|yr)?\s*$/i.test(b));
      filteredTotal.forEach(b => items.push(makeBadge(b, { type: 'total', icon: 'flame' })));
      filteredConsec.forEach(b => items.push(makeBadge(b, { type: 'consec', icon: 'trending-up' })));
      badgeDiv.innerHTML = items.length ? items.join('') : `<div class="no-data">No attendance badges yet.</div>`;
    }

    function renderYears(years) {
      const yearsList = document.getElementById('yearsList');
      if (!Array.isArray(years) || years.length === 0) {
        yearsList.innerHTML = `<div class="no-data">No events attended yet.</div>`;
        return;
      }
      yearsList.innerHTML = years.sort((a,b) => a-b).map(y => `<span class="year-chip">HC${y}</span>`).join('');
    }

    function renderProfile(profile, displayName, hackerNumber) {
      const nameEl = document.getElementById('displayName');
      nameEl.textContent = displayName || 'Hacker';
      nameEl.classList.remove('skel');

      const avatarEl = document.getElementById('avatarInitial');
      const initial = (displayName || 'H').trim().charAt(0).toUpperCase();
      if (profile.avatarUrl) {
        avatarEl.innerHTML = `<img src="${profile.avatarUrl}" alt="${displayName || 'Hacker'}">`;
      } else {
        avatarEl.textContent = initial;
      }

      const hackerNumEl = document.getElementById('hackerNumber');
      hackerNumEl.innerHTML = hackerNumber ? `<i data-lucide="hash" class="w-3.5 h-3.5"></i>&nbsp;${hackerNumber}` : `<i data-lucide="hash" class="w-3.5 h-3.5"></i>&nbsp;Unranked`;

      const eventsEl = document.getElementById('eventsAttended');
      eventsEl.textContent = profile.eventsAttended || '0';
      eventsEl.classList.remove('skel');

      const lastEl = document.getElementById('lastAttended');
      lastEl.textContent = profile.lastAttended ? `HC${profile.lastAttended}` : '—';
      lastEl.classList.remove('skel');

      window.profileData = profile; // Store for modal lookup
      renderAnniversaryBadges(profile.totalBadges || []);
      renderBadges(profile.totalBadges || [], profile.consecutiveBadges || []);

      // Render earned anniversary badges only, larger, clickable for modal view
      function renderAnniversaryBadges(totalBadges) {
        const section = document.getElementById('anniversarySection');
        const badgeDiv = document.getElementById('anniversaryBadges');
        const badgeMap = {
          '5': { img: 'assets/images/5year.png', title: '5 Years' },
          '10': { img: 'assets/images/10year.png', title: '10 Years' },
          '15': { img: 'assets/images/15year.png', title: '15 Years' },
          '20': { img: 'assets/images/20year.png', title: '20 Years' },
          '25': { img: 'assets/images/25year.png', title: '25 Years' }
        };
        const earned = [];
        (totalBadges || []).forEach(b => {
          const match = (b + '').match(/^(5|10|15|20|25)\s*(year|years|yrs|yr)?$/i);
          if (match && badgeMap[match[1]]) earned.push(badgeMap[match[1]]);
        });
        if (!earned.length) { section.style.display = 'none'; badgeDiv.innerHTML = ''; return; }
        section.style.display = '';
        badgeDiv.innerHTML = earned.map(b => `
          <div class="anniv-item">
            <div class="anniv-img-wrap" onclick="showBadgeModal('${b.img}','${b.title}')">
              <img src="${b.img}" alt="${b.title}" title="${b.title}" />
            </div>
            <div class="cap">${b.title}</div>
          </div>
        `).join('');
      }

      // Modal for badge view
      window.showBadgeModal = function(img, title) {
        let modal = document.getElementById('badgeModal');
        if (!modal) {
          modal = document.createElement('div');
          modal.id = 'badgeModal';
          modal.className = 'fixed inset-0 z-[200] flex items-center justify-center bg-black bg-opacity-80 px-4';
          modal.innerHTML = `<div class="relative badge-modal-content text-center"><img id="badgeModalImg" src="" alt="" class="rounded-2xl shadow-2xl mx-auto" style="max-width:60vw;max-height:50vh;" /><button onclick="closeBadgeModal()" class="absolute -top-3 -right-3 bg-white bg-opacity-90 rounded-full p-2 text-black"><i data-lucide="x" class="w-4 h-4"></i></button><div id="badgeModalTitle" class="text-white text-xl font-bold mt-4"></div><div id="badgeModalDetails" class="text-gray-300 text-sm mt-2 leading-relaxed"></div></div>`;
          modal.addEventListener('click', function(e) {
            if (!e.target.closest('.badge-modal-content')) {
              window.closeBadgeModal();
            }
          });
          document.body.appendChild(modal);
        }
        document.getElementById('badgeModalImg').src = img;
        document.getElementById('badgeModalImg').alt = title;
        document.getElementById('badgeModalTitle').textContent = title;
        // Work out achievement details
        let badgeNum = title.match(/\d+/) ? parseInt(title.match(/\d+/)[0]) : null;
        let profile = window.profileData || {};
        let years = Array.isArray(profile.attendedYears) ? profile.attendedYears.slice().sort((a,b)=>a-b) : [];
        let index = badgeNum ? (badgeNum-1) : null;
        let hcNum = years[index] || null;
        let year = null;
        if (hcNum) {
          // HC1 = 2000, HC20 = 2019, HC21 = 2021 (2020 skipped)
          if (hcNum <= 20) { year = 1999 + hcNum; } else { year = 2000 + hcNum; }
        }
        let location = '';
        if (profile.eventLocations && hcNum && profile.eventLocations[hcNum]) {
          location = profile.eventLocations[hcNum];
        } else if (profile.honours && hcNum) {
          let honour = profile.honours.find(h => h.eventId == hcNum && h.location);
          if (honour) location = honour.location;
        }
        let details = [];
        if (hcNum) details.push(`Hackers Cup: HC${hcNum}`);
        if (year) details.push(`Year: ${year}`);
        if (location) details.push(`Location: ${location}`);
        document.getElementById('badgeModalDetails').innerHTML = details.length
          ? details.join('<br>')
          : '<span class="text-red-300">Could not determine achievement details.</span>';
        modal.style.display = 'flex';
        lucide.createIcons();
      }
      window.closeBadgeModal = function() {
        const modal = document.getElementById('badgeModal');
        if (modal) modal.style.display = 'none';
      }

      renderYears(profile.attendedYears || []);
      renderAwards(profile);
      renderHonours(profile);
      // one icon render after DOM updates
      lucide.createIcons();
    }

    // detect attendance milestone strings or honours so we don't duplicate them
    function isAttendanceString(s) {
      if (!s) return false;
      const t = (s + '').trim();
      if (/^\d+\s*(year|years|yrs|yr)?$/i.test(t)) return true;
      if (/^\d+\s*consecutive$/i.test(t)) return true;
      if (/consec/i.test(t) && /\d+/.test(t)) return true;
      if (/[0-9]/.test(t) && (/year/i.test(t) || /yr\b/i.test(t) || /consec|consecutive/i.test(t))) return true;
      return false;
    }

    // helper to normalize an award pair into a stable dedupe key
    function makeKey(catRaw, txtRaw) {
      let cat = (catRaw||'').toString();
      let txt = (txtRaw||'').toString();
      if (cat === txt || !txt) {
        const parts = cat.split(/[-–—:]\s*/);
        if (parts.length >= 2) {
          cat = parts[0];
          txt = parts.slice(1).join(' - ');
        } else {
          txt = cat;
          cat = '';
        }
      }
      cat = cat.toLowerCase().replace(/\s+/g,' ').trim();
      txt = txt.toLowerCase().replace(/\s+/g,' ').trim();
      if (cat && txt.startsWith(cat)) {
        txt = txt.slice(cat.length).trim();
        txt = txt.replace(/^[-–—:\s]+/, '');
      }
      txt = txt.replace(/\bhc\s*\d+\b/i, '').trim();
      return `${cat}|${txt}`;
    }

    function renderAwards(profile) {
      const pill = document.getElementById('awardsCountPill');
      const honoursArray = Array.isArray(profile.honours) ? profile.honours.filter(h => !isAttendanceString(h.category || h.text)) : [];
      const otherAwardsArray = Array.isArray(profile.otherAwards) ? profile.otherAwards.filter(a => !isAttendanceString(a)) : [];
      const deduped = new Map();
      honoursArray.forEach(h => {
        const key = makeKey(h.category, h.text);
        if (!deduped.has(key)) deduped.set(key, h);
      });
      otherAwardsArray.forEach(a => {
        const key = makeKey(a, a);
        if (!deduped.has(key)) deduped.set(key, { category: a, text: a });
      });
      const honoursCount = deduped.size;
      pill.innerHTML = `<span class="count-pill">${honoursCount} total</span>`;
      document.getElementById('honoursCountStat').textContent = honoursCount;
      document.getElementById('honoursCountStat').classList.remove('skel');
    }

    function renderHonours(profile) {
      const honoursList = document.getElementById('honoursList');
      const honours = Array.isArray(profile.honours) ? profile.honours.slice() : [];
      const otherAwards = Array.isArray(profile.otherAwards) ? profile.otherAwards.slice() : [];
      const attendanceNumbers = new Set();
      (profile.totalBadges || []).concat(profile.consecutiveBadges || []).forEach(b => {
        const m = (b + '').match(/(\d+)/g);
        if (m) m.forEach(n => attendanceNumbers.add(n));
      });
      const filteredHonours = honours.filter(h => {
        const txt = (h.category || h.text || '').toString();
        if (isAttendanceString(txt)) return false;
        for (const n of attendanceNumbers) {
          if (new RegExp(`\\b${n}\\b`).test(txt)) return false;
        }
        return true;
      });
      const filteredOtherAwards = otherAwards.filter(a => {
        if (isAttendanceString(a)) return false;
        for (const n of attendanceNumbers) {
          if (new RegExp(`\\b${n}\\b`).test(a)) return false;
        }
        return true;
      }).map(a => ({ category: a, text: a }));
      const merged = filteredHonours.concat(filteredOtherAwards);
      const dedupedMap = new Map();
      for (const h of merged) {
        const key = makeKey(h.category, h.text);
        if (dedupedMap.has(key)) {
          const existing = dedupedMap.get(key);
          ['eventId','year','location'].forEach(field => {
            if (h[field] && !existing[field]) existing[field] = h[field];
          });
        } else {
          dedupedMap.set(key, Object.assign({}, h));
        }
      }
      const combined = Array.from(dedupedMap.values());
      if (!combined.length) {
        honoursList.innerHTML = `<p class="no-data">No honours recorded yet.</p>`;
        return;
      }
      combined.sort((a,b) => (b.year || 0) - (a.year || 0));
      honoursList.innerHTML = combined.map(h => {
        const year = h.year || '';
        const eventId = h.eventId ? `HC${h.eventId}` : '';
        const category = h.category || h.text || 'Award';
        const text = h.text || category;
        const location = h.location
          ? `<div class="loc-row"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i>${h.location}</div>`
          : '';
        return `
          <article class="honour-card">
            <div class="icon-box"><i data-lucide="award" class="w-5 h-5"></i></div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2 flex-wrap">
                <div class="meta">${[year, eventId].filter(Boolean).join(' · ')}</div>
                <div class="meta">${category}</div>
              </div>
              <div class="title">${text}</div>
              ${location}
            </div>
          </article>
        `;
      }).join('');
      lucide.createIcons();
    }

    function renderPersonalDetails(gaNumber, shirtSize, coming, skins) {
      const grid = document.getElementById('personalDetailsGrid');
      function detailItem(label, value, badge) {
        let valHtml;
        if (badge) {
          const yes = !!value;
          valHtml = `<span class="pd-badge ${yes ? 'yes' : 'no'}">${yes ? 'Yes' : 'No'}</span>`;
        } else {
          valHtml = `<span class="pd-value">${value || '&mdash;'}</span>`;
        }
        return `<div class="personal-detail-cell"><div class="pd-label">${label}</div>${valHtml}</div>`;
      }
      grid.innerHTML = [
        detailItem('Golf Australia No.', gaNumber, false),
        detailItem('Shirt Size', shirtSize, false),
        detailItem('Attending HC26', coming, true),
        detailItem('Skins', skins, true),
      ].join('');
    }

    firebase.auth().onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      const userRef = database.ref(`users/${user.uid}/displayName`);
      const hackerRef = database.ref(`users/${user.uid}/hackerNumber`);
      let displayName = 'Hacker';
      let hackerNumber = '';
      await userRef.once('value').then(snap => { if (snap.exists()) displayName = snap.val(); });
      await hackerRef.once('value').then(snap => { if (snap.exists()) hackerNumber = snap.val(); });
      const profileRef = db.collection('attendeeProfiles').doc(displayName);
      window.currentProfileRef = profileRef; // used by avatar upload to persist avatarUrl

      // Fetch personal details from users doc and HC26 event record
      db.collection('users').doc(user.uid).get().then(userDoc => {
        const gaNumber = userDoc.exists ? (userDoc.data().golfAustraliaNumber || '') : '';
        db.collection('eventYears').doc('HC26').collection('players').doc(user.uid).get().then(eventDoc => {
          const ep = eventDoc.exists ? eventDoc.data() : {};
          renderPersonalDetails(gaNumber, ep.shirtSize || '', !!ep.coming, !!ep.skins);
        });
      });

      profileRef.onSnapshot(doc => {
        if (doc.exists) {
          renderProfile(doc.data(), displayName, hackerNumber);
        } else {
          const nameEl = document.getElementById('displayName');
          nameEl.textContent = displayName;
          nameEl.classList.remove('skel');
          document.getElementById('eventsAttended').textContent = '0';
          document.getElementById('eventsAttended').classList.remove('skel');
          document.getElementById('lastAttended').textContent = '—';
          document.getElementById('lastAttended').classList.remove('skel');
          renderBadges([], []);
          renderYears([]);
          renderAwards({});
          renderHonours({});
        }
      });
    });

    // ============================================
    // Profile picture upload via Cloudinary
    // (unsigned upload — no API secret in client code)
    // ============================================
    const CLOUDINARY_CLOUD_NAME = 'dqfmmwep3';
    const CLOUDINARY_UPLOAD_PRESET = 'hackers_cup_avatars';

    function setAvatarStatus(msg, type) {
      const el = document.getElementById('avatarStatus');
      if (!el) return;
      el.textContent = msg || '';
      el.classList.remove('error', 'success');
      if (type) el.classList.add(type);
    }

    const avatarUploadWidget = cloudinary.createUploadWidget(
      {
        cloudName: CLOUDINARY_CLOUD_NAME,
        uploadPreset: CLOUDINARY_UPLOAD_PRESET,
        sources: ['local', 'camera', 'url'],
        multiple: false,
        cropping: true,
        croppingAspectRatio: 1,
        showSkipCropButton: false,
        maxImageFileSize: 8000000, // 8MB
        clientAllowedFormats: ['png', 'jpg', 'jpeg', 'webp'],
        styles: {
          palette: {
            window: '#0f172a',
            windowBorder: '#334155',
            tabIcon: '#38bdf8',
            menuIcons: '#94a3b8',
            textDark: '#0f172a',
            textLight: '#ffffff',
            link: '#38bdf8',
            action: '#0ea5e9',
            inactiveTabIcon: '#64748b',
            error: '#f87171',
            inProgress: '#38bdf8',
            complete: '#34d399',
            sourceBg: '#1e293b'
          }
        }
      },
      async (error, result) => {
        if (error) {
          console.error('Cloudinary upload error:', error);
          setAvatarStatus('Upload failed — try again.', 'error');
          document.getElementById('avatarWrap').classList.remove('avatar-uploading');
          return;
        }
        if (result.event === 'success') {
          const secureUrl = result.info.secure_url;
          // Re-render immediately for snappy feedback
          const avatarEl = document.getElementById('avatarInitial');
          avatarEl.innerHTML = `<img src="${secureUrl}" alt="Profile picture">`;
          try {
            if (window.currentProfileRef) {
              await window.currentProfileRef.set({ avatarUrl: secureUrl }, { merge: true });
            }
            setAvatarStatus('Profile picture updated.', 'success');
          } catch (e) {
            console.error('Failed to save avatar URL:', e);
            setAvatarStatus('Uploaded, but saving failed — try again.', 'error');
          }
          document.getElementById('avatarWrap').classList.remove('avatar-uploading');
        }
        if (result.event === 'close') {
          document.getElementById('avatarWrap').classList.remove('avatar-uploading');
        }
      }
    );

    document.getElementById('avatarEditBtn').addEventListener('click', () => {
      setAvatarStatus('');
      document.getElementById('avatarWrap').classList.add('avatar-uploading');
      avatarUploadWidget.open();
    });

    // Remove Preloader
    (function handlePreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;
      const hasVisited = localStorage.getItem('hc_preloaded') === '1';
      let removed = false;
      const hidePreloader = () => {
        if (removed) return;
        removed = true;
        preloader.style.opacity = '0';
        setTimeout(() => preloader.remove(), 300);
        localStorage.setItem('hc_preloaded', '1');
      };
      if (hasVisited) {
        preloader.style.opacity = '0';
        preloader.remove();
        return;
      }
      window.addEventListener('load', hidePreloader, { once: true });
      setTimeout(hidePreloader, 3000);
    })();

    // Mobile menu toggle now lives in assets/js/site-nav.js

    // Smooth-scroll to honours section and add temporary highlight
    function smoothScrollToHonours() {
      const el = document.getElementById('honoursList');
      if (!el) return;
      const nav = document.querySelector('nav');
      const navH = nav ? nav.offsetHeight : 80;
      const top = el.getBoundingClientRect().top + window.scrollY - navH - 16;
      window.scrollTo({ top, behavior: 'smooth' });
      el.classList.add('highlight');
      setTimeout(() => el.classList.remove('highlight'), 1400);
    }
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href="#honoursList"]');
      if (a) {
        e.preventDefault();
        smoothScrollToHonours();
      }
    });

    lucide.createIcons();
  </script>
